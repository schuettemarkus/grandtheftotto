<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grand Theft Otto</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{overflow:hidden;height:100%;background:#1a1a2e;font-family:'Segoe UI',sans-serif}
body>canvas{display:block;position:fixed;top:0;left:0}
#loading{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1a1a2e;color:#fff;transition:opacity 0.8s}
#loading.done{opacity:0;pointer-events:none}
#loading h1{font-size:2.5rem;color:#ffd700;letter-spacing:0.15em;margin-bottom:0.5rem}
#loading p{color:#888;font-size:0.9rem}
/* ── Speedometer (center-bottom) ── */
#speedo-wrap{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);pointer-events:none;z-index:10;text-align:center}
#speedo{display:block}
#gear{position:absolute;bottom:58px;left:50%;transform:translateX(-50%);font:bold 2.2rem 'Segoe UI',sans-serif;color:#ffd700;text-shadow:0 0 12px rgba(255,215,0,0.6);transition:color 0.15s,text-shadow 0.15s}
#gear.shift{color:#fff;text-shadow:0 0 20px rgba(255,255,255,0.9)}
#speed-val{font:bold 1rem monospace;color:#fff;margin-top:-8px;letter-spacing:0.05em}
#drift-bar{width:160px;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;margin:4px auto 0;overflow:hidden;opacity:0;transition:opacity 0.2s}
#drift-bar.active{opacity:1}
#drift-fill{width:0%;height:100%;background:linear-gradient(90deg,#ffd700,#ff8800);border-radius:3px;transition:width 0.05s linear;box-shadow:0 0 8px rgba(255,170,0,0.6)}
/* ── Game info (top-right) ── */
#game-info{position:fixed;top:14px;right:14px;pointer-events:none;z-index:10;text-align:right;font-family:monospace}
#game-mode{font:bold 1rem monospace;color:#ffd700;letter-spacing:0.12em;margin-bottom:6px}
#game-status{font:bold 0.85rem monospace;color:#00ccff;margin-bottom:4px;min-height:1.1em}
#game-coins{font:bold 0.95rem monospace;color:#ffd700}
#game-creatures{font:bold 0.95rem monospace;color:#ff4444;margin-top:2px}
/* ── Controls reference (bottom-right) ── */
#controls-ref{position:fixed;bottom:14px;right:14px;pointer-events:none;z-index:10;background:rgba(0,0,0,0.45);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:8px 12px;font:0.65rem monospace;color:rgba(255,255,255,0.55);line-height:1.6}
#controls-ref .ctrl-title{color:rgba(255,215,0,0.7);font-weight:bold;font-size:0.7rem;margin-bottom:2px}
/* ── Minimap (top-left) ── */
#minimap{position:fixed;top:14px;left:14px;pointer-events:none;z-index:10;border-radius:8px;border:1px solid rgba(255,255,255,0.12);overflow:hidden}
/* ── Stunt popup ── */
#stunt-popup{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:10;font:bold 1.4rem monospace;color:#ffcc00;text-shadow:0 0 12px rgba(255,200,0,0.8);opacity:0;transition:opacity 0.3s,transform 0.3s}
#stunt-popup.show{opacity:1;transform:translate(-50%,-60%)}
</style>
</head>
<body>
<div id="loading">
  <h1>GRAND THEFT OTTO</h1>
  <div style="width:40px;height:4px;background:#333;border-radius:2px;margin-top:12px;overflow:hidden">
    <div style="width:60%;height:100%;background:#ffd700;border-radius:2px;animation:pulse 1s ease-in-out infinite alternate"></div>
  </div>
  <style>@keyframes pulse{from{width:20%}to{width:90%}}</style>
</div>
<!-- Options Menu -->
<div id="opts" style="position:fixed;inset:0;z-index:80;display:none;background:rgba(0,0,0,0.85);font-family:'Segoe UI',sans-serif;color:#fff">
  <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:400px;background:rgba(20,20,25,0.97);border:1px solid #555;border-radius:14px;padding:28px 32px;text-align:center">
    <h2 style="color:#ffd700;font-size:1.5rem;margin-bottom:18px;letter-spacing:0.12em">OPTIONS</h2>
    <div id="opt-list"></div>
    <div style="display:flex;gap:10px;justify-content:center;margin-top:20px">
      <button id="opt-start" style="flex:1;padding:10px 0;background:#22aa44;color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:bold;font-size:0.9rem">START GAME</button>
      <button id="opt-resume" style="flex:1;padding:10px 0;background:#ffd700;color:#111;border:none;border-radius:6px;cursor:pointer;font-weight:bold;font-size:0.9rem">RESUME</button>
      <button id="opt-reset" style="flex:1;padding:10px 0;background:#cc3333;color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:bold;font-size:0.9rem">RESET ALL</button>
    </div>
  </div>
</div>
<div id="hit-flash" style="position:fixed;inset:0;background:rgba(255,0,0,0.3);pointer-events:none;z-index:9;opacity:0;transition:opacity 0.15s"></div>
<!-- Speedometer -->
<div id="speedo-wrap">
  <canvas id="speedo" width="200" height="200"></canvas>
  <div id="gear">N</div>
  <div id="speed-val">0 MPH</div>
  <div id="drift-bar"><div id="drift-fill"></div></div>
</div>
<!-- Game info (top-right) -->
<div id="game-info">
  <div id="game-mode">EXPLORE</div>
  <div id="game-status"></div>
  <div id="game-coins">Coins: 0</div>
  <div id="game-creatures"></div>
</div>
<!-- Minimap (top-left) -->
<canvas id="minimap" width="150" height="150"></canvas>
<!-- Stunt popup -->
<div id="stunt-popup"></div>
<!-- Controls reference (bottom-right) -->
<div id="controls-ref">
  <div class="ctrl-title">KEYBOARD</div>
  <div id="ctrl-body">
    W/S Drive &bull; A/D Steer<br>
    Space Boost &bull; R Reset<br>
    H Horn &bull; ESC Menu
  </div>
</div>
<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js'
import * as CANNON from 'https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js'

// ════════════════════════════════════════════════════════════
// SOUND ENGINE — fully procedural via Web Audio API (zero assets)
// ════════════════════════════════════════════════════════════
const AudioEngine = {
  ctx: null, masterGain: null, engineOsc: null, engineGain: null,
  boostOsc: null, boostGain: null, windNode: null, windGain: null,
  ambientNode: null, ambientGain: null, _started: false,

  init() {
    if (this.ctx) return
    this.ctx = new (window.AudioContext || window.webkitAudioContext)()
    this.masterGain = this.ctx.createGain()
    this.masterGain.gain.value = 0.4
    this.masterGain.connect(this.ctx.destination)

    // Engine hum — sawtooth oscillator
    this.engineOsc = this.ctx.createOscillator()
    this.engineOsc.type = 'sawtooth'
    this.engineOsc.frequency.value = 60
    this.engineGain = this.ctx.createGain()
    this.engineGain.gain.value = 0
    const engFilter = this.ctx.createBiquadFilter()
    engFilter.type = 'lowpass'; engFilter.frequency.value = 800
    this.engineOsc.connect(engFilter)
    engFilter.connect(this.engineGain)
    this.engineGain.connect(this.masterGain)
    this.engineOsc.start()

    // Boost whine — higher frequency
    this.boostOsc = this.ctx.createOscillator()
    this.boostOsc.type = 'square'
    this.boostOsc.frequency.value = 200
    this.boostGain = this.ctx.createGain()
    this.boostGain.gain.value = 0
    const boostFilter = this.ctx.createBiquadFilter()
    boostFilter.type = 'bandpass'; boostFilter.frequency.value = 1200; boostFilter.Q.value = 2
    this.boostOsc.connect(boostFilter)
    boostFilter.connect(this.boostGain)
    this.boostGain.connect(this.masterGain)
    this.boostOsc.start()

    // Wind noise — for gliding/airborne
    const windBuf = this.ctx.createBuffer(1, this.ctx.sampleRate * 2, this.ctx.sampleRate)
    const windData = windBuf.getChannelData(0)
    for (let i = 0; i < windData.length; i++) windData[i] = Math.random() * 2 - 1
    this.windNode = this.ctx.createBufferSource()
    this.windNode.buffer = windBuf; this.windNode.loop = true
    this.windGain = this.ctx.createGain(); this.windGain.gain.value = 0
    const windFilter = this.ctx.createBiquadFilter()
    windFilter.type = 'highpass'; windFilter.frequency.value = 2000
    this.windNode.connect(windFilter)
    windFilter.connect(this.windGain)
    this.windGain.connect(this.masterGain)
    this.windNode.start()

    // Ambient space drone
    const ambBuf = this.ctx.createBuffer(1, this.ctx.sampleRate * 4, this.ctx.sampleRate)
    const ambData = ambBuf.getChannelData(0)
    for (let i = 0; i < ambData.length; i++) ambData[i] = Math.random() * 2 - 1
    this.ambientNode = this.ctx.createBufferSource()
    this.ambientNode.buffer = ambBuf; this.ambientNode.loop = true
    this.ambientGain = this.ctx.createGain(); this.ambientGain.gain.value = 0.03
    const ambFilter = this.ctx.createBiquadFilter()
    ambFilter.type = 'lowpass'; ambFilter.frequency.value = 200
    this.ambientNode.connect(ambFilter)
    ambFilter.connect(this.ambientGain)
    this.ambientGain.connect(this.masterGain)
    this.ambientNode.start()

    this._started = true
  },

  updateEngine(speed, isBoosting, isAirborne) {
    if (!this._started) return
    const absSpd = Math.abs(speed)
    // Engine pitch and volume scale with speed
    this.engineOsc.frequency.value = 60 + absSpd * 8
    this.engineGain.gain.value = Math.min(0.15, absSpd * 0.008)
    // Boost whine
    this.boostOsc.frequency.value = 200 + absSpd * 12
    this.boostGain.gain.value = isBoosting ? 0.06 : 0
    // Wind
    this.windGain.gain.value = isAirborne ? Math.min(0.08, absSpd * 0.003) : 0
  },

  playHit() {
    if (!this._started) return
    const osc = this.ctx.createOscillator()
    const gain = this.ctx.createGain()
    osc.type = 'square'; osc.frequency.value = 150
    gain.gain.value = 0.2
    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.15)
    osc.connect(gain); gain.connect(this.masterGain)
    osc.start(); osc.stop(this.ctx.currentTime + 0.15)
  },

  playPowerup(type) {
    if (!this._started) return
    const now = this.ctx.currentTime
    const notes = type === 'giant' ? [130, 165, 196] : type === 'speed' ? [330, 440, 660] : [440, 554, 660]
    notes.forEach((f, i) => {
      const osc = this.ctx.createOscillator()
      const gain = this.ctx.createGain()
      osc.type = 'sine'; osc.frequency.value = f
      gain.gain.value = 0.12
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15 + i * 0.1)
      osc.connect(gain); gain.connect(this.masterGain)
      osc.start(now + i * 0.08); osc.stop(now + 0.2 + i * 0.1)
    })
  },

  playDrift() {
    if (!this._started) return
    const buf = this.ctx.createBuffer(1, this.ctx.sampleRate * 0.3, this.ctx.sampleRate)
    const data = buf.getChannelData(0)
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length)
    const src = this.ctx.createBufferSource(); src.buffer = buf
    const gain = this.ctx.createGain(); gain.gain.value = 0.05
    const filter = this.ctx.createBiquadFilter()
    filter.type = 'bandpass'; filter.frequency.value = 600; filter.Q.value = 1
    src.connect(filter); filter.connect(gain); gain.connect(this.masterGain)
    src.start()
  },

  playMenuClick() {
    if (!this._started) return
    const osc = this.ctx.createOscillator()
    const gain = this.ctx.createGain()
    osc.type = 'sine'; osc.frequency.value = 800
    gain.gain.value = 0.08
    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.06)
    osc.connect(gain); gain.connect(this.masterGain)
    osc.start(); osc.stop(this.ctx.currentTime + 0.06)
  },

  setMuted(muted) {
    if (!this._started) return
    this.masterGain.gain.value = muted ? 0 : 0.4
  }
}

// Start audio on first user interaction (browser policy)
const _startAudio = () => { AudioEngine.init(); document.removeEventListener('click', _startAudio); document.removeEventListener('keydown', _startAudio) }
document.addEventListener('click', _startAudio)
document.addEventListener('keydown', _startAudio)

// ════════════════════════════════════════════════════════════
// REUSABLE TEMP OBJECTS — avoid per-frame allocations
// ════════════════════════════════════════════════════════════
const _tv1 = new THREE.Vector3(), _tv2 = new THREE.Vector3(), _tv3 = new THREE.Vector3()
const _tv4 = new THREE.Vector3(), _tv5 = new THREE.Vector3()
const _tm1 = new THREE.Matrix4()
const _tq1 = new THREE.Quaternion()

// ════════════════════════════════════════════════════════════
// SCENE, CAMERA, RENDERER
// ════════════════════════════════════════════════════════════
const scene = new THREE.Scene()
scene.background = new THREE.Color(0x020010)
// No scene fog — space is visible, map is lit by sun

const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 2000)
camera.position.set(0, 12, 15)

const renderer = new THREE.WebGLRenderer({ antialias: true })
renderer.setSize(innerWidth, innerHeight)
renderer.setPixelRatio(Math.min(devicePixelRatio, 2))
renderer.shadowMap.enabled = true
renderer.shadowMap.type = THREE.BasicShadowMap // fastest shadow type
renderer.toneMapping = THREE.ACESFilmicToneMapping
renderer.toneMappingExposure = 1.1
document.body.appendChild(renderer.domElement)

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight
  camera.updateProjectionMatrix()
  renderer.setSize(innerWidth, innerHeight)
})

// ════════════════════════════════════════════════════════════
// LIGHTS
// ════════════════════════════════════════════════════════════
scene.add(new THREE.HemisphereLight(0x88bbee, 0x445500, 0.8))
const sun = new THREE.DirectionalLight(0xffffff, 1.5)
sun.position.set(30, 50, 20)
sun.castShadow = true
sun.shadow.camera.left = -50; sun.shadow.camera.right = 50
sun.shadow.camera.top = 50; sun.shadow.camera.bottom = -50
sun.shadow.camera.far = 120
sun.shadow.mapSize.set(1024, 1024)
scene.add(sun)

// ════════════════════════════════════════════════════════════
// PHYSICS WORLD (must be before track/car/props that reference groundMat)
// ════════════════════════════════════════════════════════════
const world = new CANNON.World({ gravity: new CANNON.Vec3(0, -15, 0) })
world.broadphase = new CANNON.SAPBroadphase(world)
world.defaultContactMaterial.friction = 0.3
world.defaultContactMaterial.restitution = 0.2

const groundMat = new CANNON.Material('ground')
const carMat = new CANNON.Material('car')
world.addContactMaterial(new CANNON.ContactMaterial(groundMat, carMat, {
  friction: 0.7, restitution: 0.0  // zero bounce — no weird hops
}))

// ── Ground ──
const floorGeo = new THREE.PlaneGeometry(400, 400)
// Futuristic ground texture — subtle hex grid pattern
const floorTex = (function() {
  const c = document.createElement('canvas'); c.width = 256; c.height = 256
  const x = c.getContext('2d')
  x.fillStyle = '#4a8a3a'; x.fillRect(0, 0, 256, 256)
  // Hex grid lines
  x.strokeStyle = 'rgba(100,200,80,0.12)'; x.lineWidth = 1
  const hexR = 24
  for (let row = -1; row < 12; row++) {
    for (let col = -1; col < 8; col++) {
      const cx = col * hexR * 1.73 + (row % 2) * hexR * 0.866
      const cy = row * hexR * 1.5
      x.beginPath()
      for (let i = 0; i < 6; i++) {
        const a = Math.PI / 3 * i - Math.PI / 6
        const px = cx + hexR * Math.cos(a), py = cy + hexR * Math.sin(a)
        i === 0 ? x.moveTo(px, py) : x.lineTo(px, py)
      }
      x.closePath(); x.stroke()
    }
  }
  // Subtle glow dots at intersections
  x.fillStyle = 'rgba(150,255,120,0.06)'
  for (let row = 0; row < 10; row++) for (let col = 0; col < 7; col++) {
    const cx = col * hexR * 1.73 + (row % 2) * hexR * 0.866
    const cy = row * hexR * 1.5
    x.beginPath(); x.arc(cx, cy, 3, 0, Math.PI * 2); x.fill()
  }
  const tex = new THREE.CanvasTexture(c)
  tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping
  tex.repeat.set(30, 30)
  return tex
})()
const floorMeshMat = new THREE.MeshStandardMaterial({ color: 0x559944, roughness: 0.85, map: floorTex })
const floor = new THREE.Mesh(floorGeo, floorMeshMat)
floor.rotation.x = -Math.PI / 2
floor.receiveShadow = true
scene.add(floor)

// terrainNoise kept for tree/streetlight placement (returns 0 when terrain is flat)
function terrainNoise() { return 0 }

// ── Nova Land ground — white/baby blue zone north of z=-200 ──
const novaFloorTex = (function() {
  const c = document.createElement('canvas'); c.width = 256; c.height = 256
  const x = c.getContext('2d')
  x.fillStyle = '#d8e8f0'; x.fillRect(0, 0, 256, 256)
  x.strokeStyle = 'rgba(130,190,220,0.15)'; x.lineWidth = 1
  const hexR = 24
  for (let row = -1; row < 12; row++) {
    for (let col = -1; col < 8; col++) {
      const cx2 = col * hexR * 1.73 + (row % 2) * hexR * 0.866
      const cy2 = row * hexR * 1.5
      x.beginPath()
      for (let i = 0; i < 6; i++) {
        const a = Math.PI / 3 * i - Math.PI / 6
        x.lineTo(cx2 + hexR * Math.cos(a), cy2 + hexR * Math.sin(a))
      }
      x.closePath(); x.stroke()
    }
  }
  x.fillStyle = 'rgba(180,220,255,0.08)'
  for (let row = 0; row < 10; row++) for (let col = 0; col < 7; col++) {
    const cx2 = col * hexR * 1.73 + (row % 2) * hexR * 0.866
    const cy2 = row * hexR * 1.5
    x.beginPath(); x.arc(cx2, cy2, 3, 0, Math.PI * 2); x.fill()
  }
  const t = new THREE.CanvasTexture(c)
  t.wrapS = THREE.RepeatWrapping; t.wrapT = THREE.RepeatWrapping
  t.repeat.set(30, 30)
  return t
})()
const novaFloorGeo = new THREE.PlaneGeometry(400, 400)
const novaFloorMat = new THREE.MeshStandardMaterial({ color: 0xddeeff, roughness: 0.8, map: novaFloorTex })
const novaFloor = new THREE.Mesh(novaFloorGeo, novaFloorMat)
novaFloor.rotation.x = -Math.PI / 2
novaFloor.position.z = -400 // flush with main map at z=-200
novaFloor.receiveShadow = true
scene.add(novaFloor)
// ── Boundary glow strip at z=-200 ──
const boundaryGeo = new THREE.PlaneGeometry(400, 4)
const boundaryMat = new THREE.MeshBasicMaterial({ color: 0xff69b4, transparent: true, opacity: 0.3, side: THREE.DoubleSide })
const boundaryStrip = new THREE.Mesh(boundaryGeo, boundaryMat)
boundaryStrip.rotation.x = -Math.PI / 2
boundaryStrip.position.set(0, 0.05, -200)
scene.add(boundaryStrip)
// Glowing pillars at boundary
for (let bx = -180; bx <= 180; bx += 40) {
  const pillar = new THREE.Mesh(
    new THREE.CylinderGeometry(0.3, 0.3, 6, 6),
    new THREE.MeshStandardMaterial({ color: 0xff88cc, emissive: 0xff69b4, emissiveIntensity: 1 })
  )
  pillar.position.set(bx, 3, -200)
  scene.add(pillar)
}

// ── Nova Land state ──
let inNovaLand = false

// ── Nova Land sky — fluffy clouds (hidden until entering zone) ──
const novaClouds = []
for (let i = 0; i < 8; i++) {
  const size = 30 + Math.random() * 50
  const cloud = new THREE.Mesh(
    new THREE.SphereGeometry(size * 0.4, 8, 6),
    new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0, side: THREE.DoubleSide })
  )
  cloud.position.set(
    (Math.random() - 0.5) * 350,
    60 + Math.random() * 40,
    -200 - Math.random() * 380
  )
  cloud.scale.set(2, 0.6, 1)
  scene.add(cloud)
  novaClouds.push(cloud)
}

// ── Nova Land title billboard ──
const novaTitleCanvas = document.createElement('canvas')
novaTitleCanvas.width = 2048; novaTitleCanvas.height = 512
const ntctx = novaTitleCanvas.getContext('2d')
const ntGrad = ntctx.createLinearGradient(0,0,0,512)
ntGrad.addColorStop(0, 'rgba(255,105,180,0.3)')
ntGrad.addColorStop(0.5, 'rgba(255,182,193,0.15)')
ntGrad.addColorStop(1, 'rgba(0,0,0,0)')
ntctx.fillStyle = ntGrad; ntctx.fillRect(0,0,2048,512)
ntctx.textAlign = 'center'; ntctx.textBaseline = 'middle'
ntctx.font = 'bold 180px Impact, sans-serif'
ntctx.fillStyle = '#000'; ntctx.fillText('NOVA LAND', 1028, 215)
ntctx.strokeStyle = '#ff69b4'; ntctx.lineWidth = 10; ntctx.strokeText('NOVA LAND', 1024, 210)
ntctx.fillStyle = '#FFB6C1'; ntctx.fillText('NOVA LAND', 1024, 210)
ntctx.fillStyle = 'rgba(255,255,255,0.35)'; ntctx.fillRect(200, 140, 1648, 40)
ntctx.font = 'bold 40px sans-serif'; ntctx.fillStyle = '#fff'
ntctx.fillText('WELCOME  TO  NOVA  LAND', 1024, 400)
const novaTitleTex = new THREE.CanvasTexture(novaTitleCanvas)
novaTitleTex.minFilter = THREE.LinearFilter
const novaTitleGroup = new THREE.Group()
novaTitleGroup.position.set(0, 12, -225)
const novaTitleMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(40, 10),
  new THREE.MeshBasicMaterial({ map: novaTitleTex, transparent: true, side: THREE.DoubleSide, opacity: 0 })
)
novaTitleGroup.add(novaTitleMesh)
scene.add(novaTitleGroup)

const floorBody = new CANNON.Body({
  type: CANNON.Body.STATIC,
  shape: new CANNON.Plane(),
  material: groundMat,
})
floorBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0)
world.addBody(floorBody)

// ════════════════════════════════════════════════════════════
// SPACE ENVIRONMENT — stars, planets, meteors beyond the map
// ════════════════════════════════════════════════════════════

// Starfield — thousands of points on a huge sphere
const starCount = 1500
const starGeo = new THREE.BufferGeometry()
const starPos = new Float32Array(starCount * 3)
const starSizes = new Float32Array(starCount)
for (let i = 0; i < starCount; i++) {
  const theta = Math.random() * Math.PI * 2
  const phi = Math.acos(2 * Math.random() - 1)
  const r = 600 + Math.random() * 400
  starPos[i*3]   = r * Math.sin(phi) * Math.cos(theta)
  starPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta)

}

const planetData = []
function addPlanet(x, y, z, radius, color, ringColor, name) {
  const planet = new THREE.Mesh(

    new THREE.MeshStandardMaterial({ color, roughness: 0.6, metalness: 0.2, emissive: color, emissiveIntensity: 0.15 })
  )
  planet.position.set(x, y, z)
  scene.add(planet)
  let ring = null
  if (ringColor) {
    ring = new THREE.Mesh(
      new THREE.TorusGeometry(radius * 1.6, radius * 0.12, 2, 64),
      new THREE.MeshStandardMaterial({ color: ringColor, emissive: ringColor, emissiveIntensity: 0.3, side: THREE.DoubleSide })
    )
    ring.position.copy(planet.position)
    ring.rotation.x = Math.PI * 0.35
    scene.add(ring)
  }
  // Atmosphere + portal created lazily (not added to scene until space mode)
  const atmo = new THREE.Mesh(
    new THREE.SphereGeometry(radius * 1.15, 16, 16),
    new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.08, side: THREE.BackSide })
  )
  atmo.position.copy(planet.position)
  const portal = new THREE.Mesh(
    new THREE.TorusGeometry(3, 0.3, 8, 32),
    new THREE.MeshStandardMaterial({ color: 0x00ffaa, emissive: 0x00ffaa, emissiveIntensity: 3 })
  )
  portal.position.set(x, y + radius + 0.5, z)
  portal.rotation.x = Math.PI / 2
  const pd = { mesh: planet, ring, atmo, portal, pos: new THREE.Vector3(x, y, z), radius, color, name, discovered: false, _loaded: false }
  planetData.push(pd)
  return planet
}

    vx: -15 - Math.random() * 20, vy: -8 - Math.random() * 10, vz: -10 - Math.random() * 15,
    life: Math.random() * 10
  })
}

function updateSpace(dt) {
  // Slowly rotate planets
  for (const pd of planetData) {
    pd.mesh.rotation.y += dt * 0.05
    if (pd._loaded) pd.atmo.material.opacity = 0.06 + Math.sin(performance.now() * 0.001 + pd.radius) * 0.02
  }

  // Animate meteors
  for (const m of meteors) {
    m.life -= dt
    m.x += m.vx * dt
    m.y += m.vy * dt
    m.z += m.vz * dt
    m.mesh.position.set(m.x, m.y, m.z)
    m.mesh.lookAt(m.x + m.vx, m.y + m.vy, m.z + m.vz)
    if (m.life < 0) {
      // Reset meteor
      m.x = (Math.random()-0.5) * 600
      m.y = 200 + Math.random() * 300
      m.z = (Math.random()-0.5) * 600
      m.vx = -15 - Math.random() * 25
      m.vy = -8 - Math.random() * 12
      m.vz = -10 - Math.random() * 20
      m.life = 5 + Math.random() * 8
    }
  }
}

// Helper: create mesh and set position (Object.assign doesn't work on THREE.Mesh .position)
function mp(geo, mat, x, y, z, ud) {
  const m = new THREE.Mesh(geo, mat); m.position.set(x,y,z); m.castShadow=true
  if(ud) Object.assign(m.userData, ud); return m
}

function buildCreature(type) {
  const g = new THREE.Group()
  if (type === 'dinosaur') {
    const s = 9
    const bm = new THREE.MeshStandardMaterial({ color: 0x2e8b57, roughness: 0.7, flatShading: true })
    const dm = new THREE.MeshStandardMaterial({ color: 0x1a5a35, roughness: 0.7, flatShading: true })
    const em = new THREE.MeshStandardMaterial({ color: 0xffcc00, emissive: 0xffcc00, emissiveIntensity: 0.5 })
    g.add(mp(new THREE.BoxGeometry(s*0.7,s*0.8,s*1.4), bm, 0,s*0.9,0))
    g.add(mp(new THREE.BoxGeometry(s*0.5,s*0.5,s*0.6), bm, 0,s*1.4,-s*0.8))
    g.add(mp(new THREE.BoxGeometry(s*0.45,s*0.15,s*0.5), dm, 0,s*1.1,-s*0.85))
    for (const side of [-1,1]) g.add(mp(new THREE.SphereGeometry(s*0.08,6,6), em, side*s*0.22,s*1.5,-s*0.95))
    for (const side of [-1,1]) g.add(mp(new THREE.BoxGeometry(s*0.25,s*0.7,s*0.3), dm, side*s*0.3,s*0.35,s*0.2, {leg:true}))
    for (const side of [-1,1]) g.add(mp(new THREE.BoxGeometry(s*0.08,s*0.25,s*0.08), bm, side*s*0.35,s*1.0,-s*0.4))
    g.add(mp(new THREE.BoxGeometry(s*0.3,s*0.35,s*1.2), bm, 0,s*0.8,s*1.1, {tail:true}))
    for (let i=0;i<6;i++) g.add(mp(new THREE.ConeGeometry(s*0.06,s*0.2,4), new THREE.MeshStandardMaterial({color:0x3a7a4a,flatShading:true}), 0,s*1.35,-s*0.4+i*s*0.35))
  }
  else if (type === 'dragon') {

    // Head — long snout

    // Long legs (raptors are tall-legged)
    for (const side of [-1,1]) g.add(mp(new THREE.BoxGeometry(s*0.1,s*0.7,s*0.15), bm, side*s*0.18,s*0.18,s*0.05, {leg:true}))

    for (const side of [-1,1]) g.add(mp(new THREE.BoxGeometry(s*0.06,s*0.3,s*0.06), sm, side*s*0.22,s*0.65,-s*0.35))

    g.add(mp(new THREE.BoxGeometry(s*0.15,s*0.12,s*1.4), bm, 0,s*0.65,s*1.0, {tail:true}))
    // Stripes on body
    for (let i=0;i<3;i++) g.add(mp(new THREE.BoxGeometry(s*0.42,s*0.03,s*0.15), sm, 0,s*0.9,-s*0.3+i*s*0.35))
  }
  else if (type === 'wolf') {

    const lm = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.8, flatShading: true })
    g.add(mp(new THREE.BoxGeometry(s*0.5,s*0.45,s*1.1), bm, 0,s*0.55,0))
    g.add(mp(new THREE.BoxGeometry(s*0.35,s*0.3,s*0.4), lm, 0,s*0.7,-s*0.6))
    g.add(mp(new THREE.BoxGeometry(s*0.2,s*0.15,s*0.25), lm, 0,s*0.6,-s*0.82))
    for (const side of [-1,1]) g.add(mp(new THREE.ConeGeometry(s*0.07,s*0.2,4), bm, side*s*0.12,s*0.9,-s*0.5))
    const em = new THREE.MeshStandardMaterial({color:0xcccc00,emissive:0xcccc00,emissiveIntensity:0.3})
    for (const side of [-1,1]) g.add(mp(new THREE.SphereGeometry(s*0.04,6,6), em, side*s*0.12,s*0.75,-s*0.73))
    for (const side of [-1,1]) for (const fz of [-s*0.3,s*0.3]) g.add(mp(new THREE.BoxGeometry(s*0.1,s*0.45,s*0.12), bm, side*s*0.2,s*0.22,fz, {leg:true}))
    g.add(mp(new THREE.BoxGeometry(s*0.08,s*0.1,s*0.5), bm, 0,s*0.6,s*0.75, {tail:true}))
  }
  else if (type === 'unicorn') {
    const s = 2.5
    const bm = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5, flatShading: true })
    const pm = new THREE.MeshStandardMaterial({ color: 0xffaadd, roughness: 0.5, flatShading: true })
    const hm = new THREE.MeshStandardMaterial({ color: 0xffd700, emissive: 0xffaa00, emissiveIntensity: 0.6 })
    // Body
    g.add(mp(new THREE.BoxGeometry(s*0.5,s*0.45,s*1.2), bm, 0,s*0.7,0))
    // Head
    g.add(mp(new THREE.BoxGeometry(s*0.3,s*0.35,s*0.4), bm, 0,s*1.0,-s*0.65))
    // Horn (golden, glowing)
    const horn = mp(new THREE.ConeGeometry(s*0.06,s*0.5,5), hm, 0,s*1.4,-s*0.7)
    horn.rotation.x = -0.2; g.add(horn)
    // Mane (pink)
    for (let i=0;i<4;i++) g.add(mp(new THREE.BoxGeometry(s*0.08,s*0.15,s*0.12), pm, 0,s*1.1,-s*0.3+i*s*0.15))
    // Eyes
    const em = new THREE.MeshStandardMaterial({color:0x4488ff,emissive:0x4488ff,emissiveIntensity:0.5})
    for (const side of [-1,1]) g.add(mp(new THREE.SphereGeometry(s*0.04,5,5), em, side*s*0.13,s*1.05,-s*0.8))
    // Legs
    for (const side of [-1,1]) for (const fz of [-s*0.35,s*0.35]) g.add(mp(new THREE.BoxGeometry(s*0.1,s*0.55,s*0.12), bm, side*s*0.2,s*0.25,fz, {leg:true}))
    // Tail (pink, flowing)
    g.add(mp(new THREE.BoxGeometry(s*0.06,s*0.3,s*0.06), pm, 0,s*0.8,s*0.7, {tail:true}))
  }
  else if (type === 'horse') {
    const s = 2.2
    const bm = new THREE.MeshStandardMaterial({ color: 0x8b4513, roughness: 0.7, flatShading: true })
    const dm = new THREE.MeshStandardMaterial({ color: 0x5c3010, roughness: 0.7, flatShading: true })

    // Head
    g.add(mp(new THREE.BoxGeometry(s*0.25,s*0.3,s*0.5), bm, 0,s*1.0,-s*0.7))
    // Snout
    g.add(mp(new THREE.BoxGeometry(s*0.18,s*0.15,s*0.25), dm, 0,s*0.9,-s*0.9))
    // Ears
    for (const side of [-1,1]) g.add(mp(new THREE.ConeGeometry(s*0.04,s*0.15,4), bm, side*s*0.1,s*1.2,-s*0.6))
    // Eyes
    const em = new THREE.MeshStandardMaterial({color:0x222222})
    for (const side of [-1,1]) g.add(mp(new THREE.SphereGeometry(s*0.03,5,5), em, side*s*0.11,s*1.0,-s*0.82))
    // Mane
    for (let i=0;i<3;i++) g.add(mp(new THREE.BoxGeometry(s*0.06,s*0.18,s*0.08), dm, 0,s*1.1,-s*0.3+i*s*0.2))
    // Legs
    for (const side of [-1,1]) for (const fz of [-s*0.35,s*0.35]) g.add(mp(new THREE.BoxGeometry(s*0.1,s*0.55,s*0.12), bm, side*s*0.2,s*0.25,fz, {leg:true}))
    // Tail
    g.add(mp(new THREE.BoxGeometry(s*0.06,s*0.35,s*0.06), dm, 0,s*0.75,s*0.7, {tail:true}))
  }
  else if (type === 'chicken') {
    const s = 0.8
    const bm = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.7, flatShading: true })
    const rm = new THREE.MeshStandardMaterial({ color: 0xcc0000, roughness: 0.6, flatShading: true })
    const ym = new THREE.MeshStandardMaterial({ color: 0xffaa00, roughness: 0.6, flatShading: true })

    g.add(mp(new THREE.SphereGeometry(s*0.5,6,6), bm, 0,s*0.6,0))
    // Head
    g.add(mp(new THREE.SphereGeometry(s*0.25,5,5), bm, 0,s*1.1,-s*0.3))
    // Comb (red)
    g.add(mp(new THREE.BoxGeometry(s*0.08,s*0.2,s*0.15), rm, 0,s*1.35,-s*0.3))
    // Beak

    // Wings

  return g
}

let creatureScore = 0

function updateCreatures(dt) {
  const px = carBody.position.x, pz = carBody.position.z
  const isGiant = activePU === 'giant'

  for (const c of creatureList) {
    // Handle respawn timer for eaten creatures
    if (c.eaten) {
      c.respawnTimer -= dt
      if (c.respawnTimer <= 0) {
        c.eaten = false
        c.mesh.visible = true
        // Respawn far from player
        c.x = c.homeX; c.z = c.homeZ
        c.state = 'wander'
      }
      continue
    }

    c.anim += dt * (c.state === 'chase' || c.state === 'flee' ? 8 : 4)
    const dx = px - c.x, dz = pz - c.z
    const dist = Math.sqrt(dx*dx + dz*dz)

    // GIANT MODE — Pac-Man style: creatures flee, can be eaten
    if (isGiant) {
      c.state = 'flee'
      // Run AWAY from the car
      const fleeAngle = Math.atan2(-dx, -dz)
      let ad = fleeAngle - c.angle; while(ad>Math.PI)ad-=Math.PI*2; while(ad<-Math.PI)ad+=Math.PI*2
      c.angle += ad * dt * 6
      const fleeSpeed = c.chaseSpeed * 1.3
      c.x += Math.sin(c.angle) * fleeSpeed * dt
      c.z += Math.cos(c.angle) * fleeSpeed * dt

      // Car runs over creature — earn a point!
      if (dist < 6) {
        c.eaten = true
        c.respawnTimer = 5 // respawn after 5 seconds
        c.mesh.visible = false
        creatureScore++
        // Flash feedback
        puToast.textContent = '+1 CREATURE!'
        puToast.style.color = '#ff4444'
        puToast.style.opacity = '1'
        setTimeout(() => puToast.style.opacity = '0', 1200)
        // Fireworks burst on eat
        spawnFireworks()
      }
    }
    // Normal behavior
    else if (c.state === 'flee') {
      // Giant mode just ended — go back to wandering
      c.state = 'wander'
      c.wanderTarget = { x: c.x + (Math.random()-0.5)*40, z: c.z + (Math.random()-0.5)*40 }
      c.wanderTimer = 200
    }
    else if (c.state === 'wander' && dist < c.chaseRange && Math.abs(carSpeed) > 2) {
      // Only start chasing if the car is actually moving
      c.state = 'chase'
    }
    else if (c.state === 'chase' && (dist > c.giveUp || (dist < 8 && Math.abs(carSpeed) < 1))) {
      // Give up if too far OR if they've reached a stopped car — wander away
      c.state = 'wander'
      c.wanderTarget = { x: c.x + (Math.random()-0.5)*40, z: c.z + (Math.random()-0.5)*40 }
      c.wanderTimer = 200
    }

    if (c.state === 'chase') {
      const ta = Math.atan2(dx, dz)
      let ad = ta - c.angle; while(ad>Math.PI)ad-=Math.PI*2; while(ad<-Math.PI)ad+=Math.PI*2
      c.angle += ad * dt * 5
      c.x += Math.sin(c.angle) * c.chaseSpeed * dt
      c.z += Math.cos(c.angle) * c.chaseSpeed * dt
    } else if (c.state === 'wander') {
      c.wanderTimer -= dt * 60
      if (c.wanderTimer <= 0) {
        c.wanderTarget = { x: c.homeX + (Math.random()-0.5)*40, z: c.homeZ + (Math.random()-0.5)*40 }
        c.wanderTimer = 180 + Math.random() * 240
      }
      const wx = c.wanderTarget.x - c.x, wz = c.wanderTarget.z - c.z
      const ta = Math.atan2(wx, wz)
      let ad = ta - c.angle; while(ad>Math.PI)ad-=Math.PI*2; while(ad<-Math.PI)ad+=Math.PI*2
      c.angle += ad * dt * 2
      c.x += Math.sin(c.angle) * c.speed * dt
      c.z += Math.cos(c.angle) * c.speed * dt
    }

    c.x = Math.max(-180, Math.min(180, c.x))
    c.z = Math.max(-580, Math.min(180, c.z))

    // Collision: car hits creature — red flash, push CREATURE away (not the car)
    // Skip if airborne (jumping/gliding over them) or giant mode
    if (!isGiant && !isAirborne && dist < 6 && Math.abs(carSpeed) > 2 && !c._hitCooldown) {
      c._hitCooldown = true
      setTimeout(() => c._hitCooldown = false, 1000) // 1s cooldown per creature
      // Push creature far away from car — car keeps moving
      const pushDist = 25
      c.x += (-dx / (dist||1)) * pushDist
      c.z += (-dz / (dist||1)) * pushDist
      c.state = 'wander'
      c.wanderTarget = { x: c.x, z: c.z }
      c.wanderTimer = 300
      // Red flash only
      if (opts.sound) AudioEngine.playHit()
      const flash = document.getElementById('hit-flash')
      flash.style.opacity = '1'
      setTimeout(() => flash.style.opacity = '0', 200)
    }

    // Dino stomp + screen shake when big dinos are near
    const isDinoBig = c.type === 'dinosaur'
    const stompY = isDinoBig ? Math.abs(Math.sin(c.anim * 1.5)) * 0.5 : 0
    c.mesh.position.set(c.x, stompY, c.z)
    c.mesh.rotation.y = c.angle
    if (isDinoBig && dist < 35) {
      const stompPulse = Math.max(0, -Math.cos(c.anim * 1.5))
      const shake = stompPulse * (1 - dist/35) * 0.4
      camPos.x += (Math.random()-0.5) * shake
      camPos.y += (Math.random()-0.5) * shake * 0.5
    }

    // Cache creature part refs once (avoids traverse every frame)
    if (!c._partsCached) {
      c._partsCached = true; c._origColors = []; c._legs = []; c._tails = []; c._wings = []; c._fires = []
      c.mesh.traverse(child => {
        if (child.isMesh && child.material && child.material.color) {
          c._origColors.push({ mesh: child, color: child.material.color.getHex() })
        }
        if (child.userData.leg) c._legs.push(child)
        if (child.userData.tail) c._tails.push(child)
        if (child.userData.wing) c._wings.push(child)
        if (child.userData.fire) c._fires.push(child)
      })
    }
    // Creatures flash blue when fleeing (Pac-Man scared ghost style)
    if (c.state === 'flee') {
      const flashColor = Math.sin(c.anim * 8) > 0 ? 0x4444ff : 0x2222aa
      for (const o of c._origColors) {
        if (!o.mesh.userData.fire) o.mesh.material.color.setHex(flashColor)
      }
    } else {
      for (const o of c._origColors) o.mesh.material.color.setHex(o.color)
    }

    // Animate parts using cached refs (no traverse)
    const legAnim = Math.sin(c.anim) * 0.3
    const legSpeed = c.state === 'flee' ? 1.5 : (c.state === 'chase' ? 1 : 0.5)
    for (const leg of c._legs) leg.rotation.x = legAnim * legSpeed
    for (const tail of c._tails) tail.rotation.y = Math.sin(c.anim * 0.7) * 0.4
    for (const wing of c._wings) wing.rotation.z = Math.sin(c.anim * 2) * 0.3 * wing.userData.side
    for (const fire of c._fires) {
      const chasing = c.state === 'chase' || c.state === 'flee'
      const wanderBurst = c.state === 'wander' && Math.sin(c.anim * 0.3) > 0.85
      fire.material.opacity = chasing ? 0.7 + Math.sin(c.anim*6)*0.3 : (wanderBurst ? 0.5 : 0)
      fire.scale.setScalar(chasing ? 1.5 + Math.sin(c.anim*5)*0.5 : (wanderBurst ? 1 : 0.1))
    }
  }
}

const camNames = ['Normal', 'Wide', 'Cinematic']
const camFOVs = [60, 80, 45]
const camDists = [11, 15, 18]  // base chase distance
const camHeights = [6.6, 8, 4]

// Build options menu DOM
function buildOptMenu() {
  const list = document.getElementById('opt-list')
  list.innerHTML = ''
  const items = [
    { label: 'Creatures', key: 'creatures', val: opts.creatures ? 'ON' : 'OFF' },
    { label: 'Powerups', key: 'powerups', val: opts.powerups ? 'ON' : 'OFF' },
    { label: 'Sound', key: 'sound', val: opts.sound ? 'ON' : 'OFF' },
    { label: 'Location', key: 'location', val: locNames[opts.location] },
    { label: 'Camera', key: 'camera', val: camNames[opts.camera] },
    { label: 'Car', key: 'carSkin', val: skinNames[opts.carSkin] },
    { label: 'Day/Night', key: 'dayNight', val: dayNightNames[opts.dayNight] },
  ]
  const totalItems = items.length + 2 // +2 for Start/Reset buttons at bottom
  items.forEach((it, idx) => {
    const row = document.createElement('div')
    row.style.cssText = 'display:flex;justify-content:space-between;align-items:center;padding:10px 4px;border-bottom:1px solid rgba(255,255,255,0.06)'
    if (idx === optSel) row.style.background = 'rgba(255,215,0,0.1)'
    const isOn = it.val === 'ON' || it.key === 'location' || it.key === 'camera'
    const sel = idx === optSel ? ' style="color:#ffd700;font-size:1.05rem"' : ''
    row.innerHTML = `<span${sel}>${idx === optSel ? '\u25b6 ' : '  '}${it.label}</span>
      <button onclick="toggleOpt('${it.key}')" style="background:${isOn?'#ffd700':'#444'};color:${isOn?'#111':'#ccc'};border:none;padding:6px 16px;border-radius:5px;cursor:pointer;font-size:0.85rem;font-weight:bold;min-width:90px">${it.val}</button>`
    list.appendChild(row)
  })
  // Highlight Start/Reset buttons if selected via D-pad
  const startBtn = document.getElementById('opt-start')
  const resetBtn = document.getElementById('opt-reset')
  startBtn.style.outline = optSel === items.length ? '2px solid #ffd700' : 'none'
  resetBtn.style.outline = optSel === items.length + 1 ? '2px solid #ffd700' : 'none'
}
window.toggleOpt = function(key) {
  if (key === 'location') { opts.location = (opts.location + 1) % locNames.length; floor.material.color.setHex(locColors[opts.location]) }
  else if (key === 'camera') {
    opts.camera = (opts.camera + 1) % camNames.length
    camera.fov = camFOVs[opts.camera]
    camera.updateProjectionMatrix()
  }
  else if (key === 'carSkin') {
    opts.carSkin = (opts.carSkin + 1) % skinNames.length
    applyCarSkin(opts.carSkin)
  }
  else if (key === 'dayNight') {
    opts.dayNight = (opts.dayNight + 1) % dayNightNames.length
    if (opts.dayNight === 1) timeOfDay = 0.35 // Day — lock to noon-ish
    else if (opts.dayNight === 2) timeOfDay = 0.85 // Night — lock to midnight-ish
  }
  else opts[key] = !opts[key]
  if (key === 'creatures') creatureList.forEach(c => c.mesh.visible = opts.creatures)
  if (key === 'powerups') powerupMeshes.forEach(p => { if(!p.collected) p.mesh.visible = opts.powerups })
  if (key === 'sound') { AudioEngine.init(); AudioEngine.setMuted(!opts.sound) }
  AudioEngine.playMenuClick()
  buildOptMenu()
}

function closeMenu() { menuOpen = false; document.getElementById('opts').style.display = 'none' }
function startGame() {
  // Exit space/planet mode if active
  if (spaceMode || onPlanet >= 0) { spaceMode = false; onPlanet = -1; carBody.type = CANNON.Body.DYNAMIC; removeSuperGlider() }
  carBody.position.set(0, 3, 0); carBody.velocity.setZero(); carBody.angularVelocity.setZero()
  carBody.quaternion.setFromEuler(0, 0, 0)
  carAngle = 0; carSpeed = 0; coinCount = 0; creatureScore = 0; driftScore = 0; driftTime = 0; stuntScore = 0; stuntCombo = 0
  camera.up.set(0, 1, 0)
  closeMenu()
}
function resetAll() {
  startGame()
  // Reset powerups
  for (const p of powerupMeshes) { p.collected = false; p.mesh.visible = opts.powerups }
  // Reset creatures to home
  for (const c of creatureList) { c.x = c.homeX; c.z = c.homeZ; c.state = 'wander'; c.eaten = false; c.mesh.visible = opts.creatures }
  activePU = null; puTimer = 0; carGroup.scale.setScalar(1)
}

document.getElementById('opt-resume').onclick = closeMenu
document.getElementById('opt-start').onclick = startGame
document.getElementById('opt-reset').onclick = resetAll

window.addEventListener('keydown', e => {
  keys[e.code] = true

})

// Build unique icon textures for each powerup type
function makePUIcon(icon, bgColor) {
  const c = document.createElement('canvas'); c.width = 128; c.height = 128
  const x = c.getContext('2d')
  // Glowing circle bg
  const grd = x.createRadialGradient(64,64,10,64,64,60)
  grd.addColorStop(0, bgColor); grd.addColorStop(1, 'rgba(0,0,0,0)')
  x.fillStyle = grd; x.fillRect(0,0,128,128)
  // Icon
  x.font = '64px sans-serif'; x.textAlign = 'center'; x.textBaseline = 'middle'
  x.fillStyle = '#fff'; x.fillText(icon, 64, 64)
  return new THREE.CanvasTexture(c)
}
const puIcons = {
  speed: makePUIcon('\u26A1', 'rgba(0,200,255,0.8)'),    // lightning bolt
  jump:  makePUIcon('\u{1F680}', 'rgba(255,68,255,0.8)'), // rocket
  giant: makePUIcon('\u{1F4AA}', 'rgba(68,255,68,0.8)'),  // flexed bicep
  coins: makePUIcon('\u{1FA99}', 'rgba(255,215,0,0.8)'),  // coin
}

for (let i = 0; i < 22; i++) {
  const t = puTypes[i % puTypes.length]
  const x = (Math.random()-0.5) * 320, z = (Math.random()-0.5) * 320
  if (Math.abs(x)<8 && Math.abs(z)<8) continue
  // Billboard sprite with icon texture
  const mat = new THREE.SpriteMaterial({ map: puIcons[t.effect], transparent: true, depthTest: false })
  const mesh = new THREE.Sprite(mat)
  mesh.scale.set(8, 8, 1)
  mesh.position.set(x, 4, z)
  scene.add(mesh)
  powerupMeshes.push({ mesh, type: t, x, z, collected: false, bob: Math.random()*Math.PI*2 })
}

// ── Nova Land powerups ──
for (let i = 0; i < 14; i++) {
  const t = puTypes[i % puTypes.length]
  const x = (Math.random()-0.5) * 320, z = -220 - Math.random() * 350
  const mat = new THREE.SpriteMaterial({ map: puIcons[t.effect], transparent: true, depthTest: false })
  const mesh = new THREE.Sprite(mat)
  mesh.scale.set(8, 8, 1)
  mesh.position.set(x, 4, z)
  scene.add(mesh)
  powerupMeshes.push({ mesh, type: t, x, z, collected: false, bob: Math.random()*Math.PI*2 })
}

function updatePowerups(dt) {
  if (!opts.powerups) return
  const px = carBody.position.x, pz = carBody.position.z
  for (const p of powerupMeshes) {
    if (p.collected) continue
    p.bob += dt * 3
    p.mesh.position.y = 4 + Math.sin(p.bob) * 0.6
    const pulse = 1 + Math.sin(p.bob * 2) * 0.15
    p.mesh.scale.set(8 * pulse, 8 * pulse, 1)
    const dx = px - p.x, dz = pz - p.z
    if (dx*dx+dz*dz < 9) {
      p.collected = true; p.mesh.visible = false
      if (opts.sound) AudioEngine.playPowerup(p.type.effect)
      puToast.textContent = p.type.name + '!'
      puToast.style.color = '#'+p.type.color.toString(16).padStart(6,'0')
      puToast.style.opacity = '1'
      setTimeout(() => puToast.style.opacity = '0', 2000)
      if (p.type.effect === 'speed') { activePU = 'speed'; puTimer = 5 }
      else if (p.type.effect === 'jump') { carBody.velocity.y = 28; isAirborne = true }
      else if (p.type.effect === 'giant') { activePU = 'giant'; puTimer = 6; carGroup.scale.setScalar(3) }
      else if (p.type.effect === 'coins') coinCount += 10
    }
  }
  if (puTimer > 0) { puTimer -= dt; if (puTimer <= 0) { activePU = null; carGroup.scale.setScalar(1) } }
}

// Feature 1: FIREWORKS on horn (H key) — burst of colorful particles
const fireworks = []
function spawnFireworks() {
  for (let i = 0; i < 20; i++) {
    const geo = new THREE.SphereGeometry(0.25, 3, 3)
    const colors = [0xff0000, 0x00ff00, 0x0088ff, 0xffff00, 0xff00ff, 0xff8800]
    const mat = new THREE.MeshBasicMaterial({ color: colors[Math.floor(Math.random()*colors.length)] })
    const m = new THREE.Mesh(geo, mat)
    m.position.copy(carBody.position)
    m.position.y += 3
    scene.add(m)
    fireworks.push({
      mesh: m, life: 1.5 + Math.random(),
      vx: (Math.random()-0.5)*15, vy: 8+Math.random()*10, vz: (Math.random()-0.5)*15
    })
  }
}
function updateFireworks(dt) {
  for (let i = fireworks.length-1; i >= 0; i--) {
    const f = fireworks[i]
    f.life -= dt
    f.mesh.position.x += f.vx*dt; f.mesh.position.y += f.vy*dt; f.mesh.position.z += f.vz*dt
    f.vy -= 12*dt
    f.mesh.material.opacity = Math.max(0, f.life)
    f.mesh.material.transparent = true
    if (f.life <= 0) { scene.remove(f.mesh); fireworks.splice(i, 1) }
  }
}

// Feature 2: SMOKE & FIRE TRAIL behind car at speed
const trailParts = []
let _trailFrame = 0
function updateTrail(dt) {
  _trailFrame++
  const spd = Math.abs(carSpeed)
  if (spd > 5 && _trailFrame % 3 === 0 && trailParts.length < 25) {
    const isFast = spd > 20
    const geo = new THREE.SphereGeometry(isFast ? 0.6 : 0.35, 3, 3)
    // Fire when fast, grey smoke when slow
    const color = isFast
      ? new THREE.Color().setHSL(0.05 + Math.random() * 0.05, 1, 0.5) // orange-red fire
      : new THREE.Color(0.4, 0.4, 0.4) // grey smoke
    const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: isFast ? 0.9 : 0.5 })
    const m = new THREE.Mesh(geo, mat)
    // Spawn behind the car
    const backX = Math.sin(carAngle) * (carL * 0.5 + 0.5)
    const backZ = Math.cos(carAngle) * (carL * 0.5 + 0.5)
    m.position.set(
      carBody.position.x + backX + (Math.random()-0.5)*0.5,
      carBody.position.y + 0.3,
      carBody.position.z + backZ + (Math.random()-0.5)*0.5
    )
    scene.add(m)
    trailParts.push({ mesh: m, life: isFast ? 0.8 : 1.2, maxLife: isFast ? 0.8 : 1.2 })
  }
  for (let i = trailParts.length-1; i >= 0; i--) {
    const t = trailParts[i]
    t.life -= dt
    t.mesh.position.y += dt * 2 // smoke rises
    const frac = t.life / t.maxLife
    t.mesh.material.opacity = frac * 0.7
    t.mesh.scale.setScalar(0.5 + (1 - frac) * 1.5) // expands as it fades
    if (t.life <= 0) { scene.remove(t.mesh); trailParts.splice(i, 1) }
  }
}

// Feature 3: COIN COUNTER + CELEBRATION at milestones

  // Milestone celebrations
  if (coinCount > 0 && coinCount % 25 === 0) spawnFireworks()
}

// ════════════════════════════════════════════════════════════
// CAR DRIVING — direct velocity control (no RaycastVehicle)
// ════════════════════════════════════════════════════════════
const maxSpeed = 30
const accel = 20
const brakeForce = 15
const turnSpeed = 2.5
const boostMult = 2.5
let carSpeed = 0
let carAngle = 0
let boosting = false
let _isDrifting = false
let _isGliding = false
let _wasDrifting = false
let driftTime = 0
let driftScore = 0
let lastInputType = 'keyboard' // 'keyboard' or 'gamepad'
let spaceMode = false
let onPlanet = -1 // index into planetData, -1 = not on planet
let spacePitch = 0, spaceYaw = 0 // 3D orientation in space

function updateCar(dt) {
  // Space/planet mode handled by updateSpaceFlight
  if (spaceMode || onPlanet >= 0) return

  // Get car's up vector — if flipped, R resets
  const up = new CANNON.Vec3(0, 1, 0)
  carBody.quaternion.vmult(up, up)

  if (keys['KeyR']) {
    carBody.position.set(carBody.position.x, 3, carBody.position.z)
    carBody.quaternion.setFromEuler(0, carAngle, 0)
    carBody.velocity.setZero()
    carBody.angularVelocity.setZero()
    carSpeed = 0; return
  }
  if (keys['KeyH'] && !keys._hornCd) { keys._hornCd=true; spawnFireworks(); setTimeout(()=>keys._hornCd=false,500) }

  // Only drive if car is roughly upright
  if (up.y < 0.5) return

  // Read ALL inputs first — keyboard + gamepad
  const gp = navigator.getGamepads?.()[0]
  const gpRT = gp?.buttons[7]?.value || 0
  const gpLT = gp?.buttons[6]?.value || 0
  const gpStickX = gp ? (Math.abs(gp.axes[0]) > 0.15 ? gp.axes[0] : 0) : 0
  const gpBoosting = gp?.buttons[0]?.pressed || false
  const gpHasThrottle = gpRT > 0.15 || gpLT > 0.15
  if (gpHasThrottle || Math.abs(gpStickX) > 0 || gpBoosting) lastInputType = 'gamepad'

  const kbFwd = (keys['ArrowUp'] || keys['KeyW']) ? 1 : 0
  const kbRev = (keys['ArrowDown'] || keys['KeyS']) ? 1 : 0
  const kbThrottle = kbFwd - kbRev
  const kbBoosting = keys['Space']

  // Combine boost from either source
  boosting = kbBoosting || gpBoosting
  const speedMul = activePU === 'speed' ? 2 : 1
  const effAccel = (boosting ? accel * boostMult : accel) * speedMul
  const effMax = (boosting ? maxSpeed * 1.8 : maxSpeed) * speedMul

  // Throttle — gamepad overrides keyboard entirely if triggers are active
  if (gpHasThrottle) {
    // Gamepad triggers: full acceleration regardless of trigger depth
    if (gpRT > gpLT) carSpeed = Math.min(carSpeed + effAccel * dt, effMax)
    else carSpeed = Math.max(carSpeed - brakeForce * dt, -effMax * 0.4)
  } else if (kbThrottle > 0) {
    carSpeed = Math.min(carSpeed + effAccel * dt, effMax)
  } else if (kbThrottle < 0) {
    carSpeed = Math.max(carSpeed - brakeForce * dt, -effMax * 0.4)
  } else {
    // Coast to stop — only when NOTHING is pressed
    carSpeed *= (1 - 2 * dt)
    if (Math.abs(carSpeed) < 0.1) carSpeed = 0
  }

  // Steering — combine keyboard + gamepad
  const kbLeft = (keys['ArrowLeft'] || keys['KeyA']) ? 1 : 0
  const kbRight = (keys['ArrowRight'] || keys['KeyD']) ? 1 : 0
  const steerInput = (kbLeft - kbRight) || -gpStickX

  if (Math.abs(carSpeed) > 0.5 && Math.abs(steerInput) > 0) {
    const turnFactor = Math.min(1, Math.abs(carSpeed) / 8)
    carAngle += steerInput * turnSpeed * turnFactor * dt * Math.sign(carSpeed)
  }

  // Gamepad buttons
  if (gp) {
    if (gp.buttons[2]?.pressed) { // X = reset
      carBody.position.set(carBody.position.x, 3, carBody.position.z)
      carBody.quaternion.setFromEuler(0, carAngle, 0)
      carBody.velocity.setZero(); carBody.angularVelocity.setZero(); carSpeed = 0
    }
    if (gp.buttons[1]?.pressed && !keys._gpJump) { // B = jump
      keys._gpJump=true; carBody.velocity.y = 20; isAirborne = true
      setTimeout(()=>keys._gpJump=false,400)
    }
    if (gp.buttons[3]?.pressed && !keys._gpHorn) { keys._gpHorn=true; spawnFireworks(); setTimeout(()=>keys._gpHorn=false,500) } // Y = fireworks
    // Start = toggle menu
    if (gp.buttons[9]?.pressed && !keys._gpStart) {
      keys._gpStart=true
      menuOpen=!menuOpen; document.getElementById('opts').style.display=menuOpen?'block':'none'
      if(menuOpen) buildOptMenu()
      setTimeout(()=>keys._gpStart=false,300)
    }
    // Menu navigation with D-pad / A button when menu open
    if (menuOpen) {
      const menuKeys = ['creatures','powerups','sound','location','camera','carSkin','dayNight']
      const menuTotal = menuKeys.length + 2 // +2 for Start, Reset buttons
      if (gp.buttons[12]?.pressed && !keys._gpUp) { keys._gpUp=true; optSel=Math.max(0,optSel-1); buildOptMenu(); setTimeout(()=>keys._gpUp=false,200) }
      if (gp.buttons[13]?.pressed && !keys._gpDn) { keys._gpDn=true; optSel=Math.min(menuTotal-1,optSel+1); buildOptMenu(); setTimeout(()=>keys._gpDn=false,200) }
      if (gp.buttons[0]?.pressed && !keys._gpA) { // A = toggle/activate selected
        keys._gpA=true
        if (optSel < menuKeys.length) toggleOpt(menuKeys[optSel])
        else if (optSel === menuKeys.length) startGame()
        else resetAll()
        setTimeout(()=>keys._gpA=false,250)
      }
    }
  }

  // Apply to physics body
  carBody.velocity.set(
    -Math.sin(carAngle) * carSpeed,
    carBody.velocity.y,
    -Math.cos(carAngle) * carSpeed
  )

  // Airborne detection + glider
  if (carBody.position.y > 3) isAirborne = true
  if (carBody.position.y < 2 && carBody.velocity.y <= 0) isAirborne = false

  if (isAirborne && boosting) {
    // GLIDER — hold boost in the air to glide! Slow descent, keep speed
    carBody.velocity.y = Math.max(carBody.velocity.y, -3) // almost float
    // Show glider wings
    if (!carGroup.userData.gliderL) {
      const gMat = new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.6, side: THREE.DoubleSide })
      const gL = new THREE.Mesh(new THREE.BoxGeometry(carW * 2, 0.05, carL * 0.8), gMat)
      gL.position.set(-carW * 1.2, carH * 0.3, 0)
      gL.rotation.z = 0.15
      carGroup.add(gL)
      carGroup.userData.gliderL = gL
      const gR = new THREE.Mesh(new THREE.BoxGeometry(carW * 2, 0.05, carL * 0.8), gMat)
      gR.position.set(carW * 1.2, carH * 0.3, 0)
      gR.rotation.z = -0.15
      carGroup.add(gR)
      carGroup.userData.gliderR = gR
    }
  } else {
    // Remove glider wings when not gliding
    if (carGroup.userData.gliderL) {
      carGroup.remove(carGroup.userData.gliderL)
      carGroup.remove(carGroup.userData.gliderR)
      delete carGroup.userData.gliderL
      delete carGroup.userData.gliderR
    }
  }

  // Drift — visual tilt + dirt spray when turning at speed
  const drifting = Math.abs(steerInput) > 0.3 && Math.abs(carSpeed) > 8 && !isAirborne
  const driftTilt = drifting ? steerInput * 0.12 : 0
  if (!spaceMode && onPlanet < 0) carBody.quaternion.setFromEuler(0, carAngle, driftTilt)
  carBody.angularVelocity.x *= 0.5
  carBody.angularVelocity.z *= 0.5

  // Keep car grounded while drifting
  if (drifting && carBody.velocity.y > 0) carBody.velocity.y = 0

  // Drift timer + scoring
  if (drifting) {
    driftTime += dt
  } else if (_wasDrifting && driftTime > 0.5) {
    // Drift ended — award points
    const pts = Math.floor(driftTime * 50)
    driftScore += pts
    if (opts.sound) AudioEngine.playDrift()
    puToast.textContent = '+' + pts + ' DRIFT!'
    puToast.style.color = '#ffaa00'
    puToast.style.opacity = '1'
    setTimeout(() => puToast.style.opacity = '0', 1500)
    driftTime = 0
  } else {
    driftTime = 0
  }
  _wasDrifting = drifting

  // Dirt spray particles when drifting
  if (drifting && !isAirborne && _trailFrame % 2 === 0) {
    for (const side of [-1, 1]) {
      const dirtGeo = new THREE.SphereGeometry(0.2 + Math.random() * 0.3, 3, 3)
      const dirtMat = new THREE.MeshBasicMaterial({ color: 0x8b7355, transparent: true, opacity: 0.7 })
      const dirt = new THREE.Mesh(dirtGeo, dirtMat)
      // Spray from the side of the car opposite to turn direction
      const sideX = Math.cos(carAngle) * side * carW * 0.6
      const sideZ = -Math.sin(carAngle) * side * carW * 0.6
      dirt.position.set(
        carBody.position.x + sideX + (Math.random()-0.5),
        0.3 + Math.random() * 0.5,
        carBody.position.z + sideZ + (Math.random()-0.5)
      )
      scene.add(dirt)
      trailParts.push({
        mesh: dirt, life: 0.6, maxLife: 0.6,
        vx: sideX * 3 + (Math.random()-0.5)*2,
        vy: 2 + Math.random() * 3,
        vz: sideZ * 3 + (Math.random()-0.5)*2,
      })
    }
  }
  // Animate dirt with velocity
  for (const t of trailParts) {
    if (t.vx !== undefined) {
      t.mesh.position.x += t.vx * dt
      t.mesh.position.y += t.vy * dt
      t.mesh.position.z += t.vz * dt
      t.vy -= 10 * dt // gravity on dirt
    }
  }

  // HUD status (read by updateHUD)
  _isDrifting = drifting
  _isGliding = isAirborne && boosting
}

const speedoCanvas = document.getElementById('speedo')
const speedoCtx = speedoCanvas.getContext('2d')
const gearEl = document.getElementById('gear')
const speedValEl = document.getElementById('speed-val')
const gameModeEl = document.getElementById('game-mode')
const gameStatusEl = document.getElementById('game-status')
const gameCoinsEl = document.getElementById('game-coins')

const ctrlBodyEl = document.getElementById('ctrl-body')
const ctrlTitleEl = document.querySelector('#controls-ref .ctrl-title')
const driftBarEl = document.getElementById('drift-bar')

let displayedMph = 0
let prevGear = 'N'

function getGear(mph, speed) {
  if (speed < -0.5) return 'R'
  if (mph < 1) return 'N'
  if (mph < 15) return '1'
  if (mph < 30) return '2'
  if (mph < 50) return '3'
  if (mph < 75) return '4'
  if (mph < 100) return '5'
  return '6'
}

function drawSpeedo(mph) {
  const w = 200, h = 200, cx = w/2, cy = h/2, r = 80
  const ctx = speedoCtx
  ctx.clearRect(0, 0, w, h)

  // Background
  ctx.beginPath()
  ctx.arc(cx, cy, r + 12, 0, Math.PI * 2)
  ctx.fillStyle = 'rgba(0,0,0,0.55)'
  ctx.fill()

  const startAngle = Math.PI * 0.75  // 135°
  const endAngle = Math.PI * 2.25    // 405° (270° sweep)
  const sweep = endAngle - startAngle
  const maxMph = 160

  // Red zone arc (above 120 MPH)
  const redStart = startAngle + (120 / maxMph) * sweep
  ctx.beginPath()
  ctx.arc(cx, cy, r, redStart, endAngle, false)
  ctx.lineWidth = 8
  ctx.strokeStyle = 'rgba(255,50,50,0.25)'
  ctx.stroke()

  // Track arc
  ctx.beginPath()
  ctx.arc(cx, cy, r, startAngle, endAngle, false)
  ctx.lineWidth = 3
  ctx.strokeStyle = 'rgba(255,255,255,0.15)'
  ctx.stroke()

  // Tick marks + numbers
  for (let i = 0; i <= maxMph; i += 10) {
    const angle = startAngle + (i / maxMph) * sweep
    const cos = Math.cos(angle), sin = Math.sin(angle)
    const isMajor = i % 40 === 0
    const inner = isMajor ? r - 16 : r - 10
    const outer = r - 2
    ctx.beginPath()
    ctx.moveTo(cx + cos * inner, cy + sin * inner)
    ctx.lineTo(cx + cos * outer, cy + sin * outer)
    ctx.lineWidth = isMajor ? 2.5 : 1
    ctx.strokeStyle = i >= 120 ? 'rgba(255,80,80,0.8)' : 'rgba(255,255,255,0.6)'
    ctx.stroke()
    if (isMajor) {
      ctx.font = 'bold 11px monospace'
      ctx.fillStyle = i >= 120 ? '#ff5555' : 'rgba(255,255,255,0.7)'
      ctx.textAlign = 'center'
      ctx.textBaseline = 'middle'
      ctx.fillText('' + i, cx + cos * (r - 26), cy + sin * (r - 26))
    }
  }

  // Needle
  const clampMph = Math.min(mph, maxMph)
  const needleAngle = startAngle + (clampMph / maxMph) * sweep
  const needleLen = r - 8
  ctx.beginPath()
  ctx.moveTo(cx, cy)
  ctx.lineTo(cx + Math.cos(needleAngle) * needleLen, cy + Math.sin(needleAngle) * needleLen)
  ctx.lineWidth = 2.5
  ctx.strokeStyle = clampMph >= 120 ? '#ff4444' : '#ff8800'
  ctx.lineCap = 'round'
  ctx.stroke()

  // Center dot
  ctx.beginPath()
  ctx.arc(cx, cy, 5, 0, Math.PI * 2)
  ctx.fillStyle = '#ffd700'
  ctx.fill()
}

// ── Minimap renderer ──
const minimapCanvas = document.getElementById('minimap')
const mmCtx = minimapCanvas.getContext('2d')
// Minimap covers full extended map: x: -200 to +200 (400), z: -600 to +200 (800)
const mmW = 100, mmH = 200 // taller for extended map
const mmScaleX = mmW / 400, mmScaleZ = mmH / 800
// Resize minimap canvas
minimapCanvas.width = mmW; minimapCanvas.height = mmH
minimapCanvas.style.width = mmW + 'px'; minimapCanvas.style.height = mmH + 'px'

function drawMinimap() {
  if (spaceMode || onPlanet >= 0) { minimapCanvas.style.opacity = '0.3'; return }
  minimapCanvas.style.opacity = '1'
  const ctx = mmCtx
  ctx.clearRect(0, 0, mmW, mmH)

  // Background — two zones
  ctx.fillStyle = 'rgba(0,20,0,0.5)'
  ctx.fillRect(0, mmH/2, mmW, mmH/2) // main map (z: -200 to +200 → bottom half)
  ctx.fillStyle = 'rgba(20,10,20,0.5)'
  ctx.fillRect(0, 0, mmW, mmH/2) // Nova Land (z: -600 to -200 → top half)

  // Boundary line
  ctx.strokeStyle = 'rgba(255,105,180,0.5)'
  ctx.lineWidth = 1
  ctx.beginPath(); ctx.moveTo(0, mmH/2); ctx.lineTo(mmW, mmH/2); ctx.stroke()

  // Map border
  ctx.strokeStyle = 'rgba(100,200,80,0.2)'
  ctx.strokeRect(0, 0, mmW, mmH)

  // Helper: world coords to minimap coords
  const toMM = (wx, wz) => [(wx + 200) * mmScaleX, (wz + 600) * mmScaleZ]

  // Powerups (uncollected)
  for (const p of powerupMeshes) {
    if (p.collected) continue
    const [mx, mz] = toMM(p.x, p.z)
    ctx.fillStyle = '#' + p.type.color.toString(16).padStart(6, '0')
    ctx.fillRect(mx - 1.5, mz - 1.5, 3, 3)
  }

  // Creatures
  if (opts.creatures) {
    for (const c of creatureList) {
      if (c.eaten) continue
      const [mx, mz] = toMM(c.x, c.z)
      ctx.fillStyle = c.state === 'chase' ? '#ff4444' : c.state === 'flee' ? '#4444ff' : '#ff8844'
      ctx.beginPath(); ctx.arc(mx, mz, 2, 0, Math.PI * 2); ctx.fill()
    }
  }

  // Portals
  ctx.fillStyle = '#2196f3'
  for (const pp of portalPositions) {
    const [mx, mz] = toMM(pp[0], pp[1])
    ctx.beginPath(); ctx.arc(mx, mz, 3, 0, Math.PI * 2); ctx.fill()
  }

  // Trees — small green dots
  ctx.fillStyle = 'rgba(45,90,30,0.5)'
  for (const [tx, tz] of treePositions) {
    const [mx, mz] = toMM(tx, tz)
    ctx.fillRect(mx - 1, mz - 1, 2, 2)
  }

  // Car — white triangle pointing in driving direction
  const [cx, cz] = toMM(carBody.position.x, carBody.position.z)
  ctx.save()
  ctx.translate(cx, cz)
  ctx.rotate(-carAngle)
  ctx.fillStyle = '#ffffff'
  ctx.beginPath()
  ctx.moveTo(0, -4); ctx.lineTo(-2.5, 3); ctx.lineTo(2.5, 3)
  ctx.closePath(); ctx.fill()
  ctx.restore()
}

let _minimapFrame = 0
function updateHUD(dt) {
  _minimapFrame++
  if (_minimapFrame % 3 === 0) drawMinimap() // draw every 3rd frame
  const actualMph = Math.abs(carSpeed) * 2.237
  // Smooth needle
  displayedMph += (actualMph - displayedMph) * Math.min(1, dt * 12)

  // Speedometer
  drawSpeedo(displayedMph)
  speedValEl.textContent = Math.floor(displayedMph) + ' MPH'

  // Gear
  const gear = getGear(displayedMph, carSpeed)
  gearEl.textContent = gear
  if (gear !== prevGear) {
    gearEl.classList.add('shift')
    setTimeout(() => gearEl.classList.remove('shift'), 150)
    prevGear = gear
  }

  // Game mode label (reset if on ground)
  if (!spaceMode && onPlanet < 0 && !inNovaLand) { gameModeEl.textContent = 'EXPLORE'; gameModeEl.style.color = '#ffd700' }

  // Game info — status (drift / glide / powerup)
  let status = ''
  if (_isGliding) status = 'GLIDING'
  else if (_isDrifting) status = 'DRIFT!'
  if (activePU && puTimer > 0) {
    const puName = activePU === 'speed' ? 'SPEED BOOST' : activePU === 'giant' ? 'GIANT MODE' : activePU.toUpperCase()
    status = (status ? status + ' | ' : '') + puName + ' ' + puTimer.toFixed(1) + 's'
  }
  gameStatusEl.textContent = status
  gameStatusEl.style.color = _isDrifting ? '#ffaa00' : _isGliding ? '#88ddff' : '#00ccff'

  // Drift bar
  if (driftTime > 0) {
    driftBarEl.classList.add('active')
    driftFillEl.style.width = Math.min(100, driftTime / 5 * 100) + '%'
  } else {
    driftBarEl.classList.remove('active')
    driftFillEl.style.width = '0%'
  }

  // Coins + creatures + drift + stunt scores
  let scoreText = 'Coins: ' + coinCount
  if (driftScore > 0) scoreText += '  Drift: ' + driftScore
  if (stuntScore > 0) scoreText += '  Stunts: ' + stuntScore
  gameCoinsEl.textContent = scoreText
  if (creatureScore > 0) {
    gameCreaturesEl.textContent = 'Creatures: ' + creatureScore
  }

  // Controls reference — context-sensitive
  if (spaceMode) {
    ctrlTitleEl.textContent = lastInputType === 'gamepad' ? 'SPACE FLIGHT (XBOX)' : 'SPACE FLIGHT'
    ctrlBodyEl.innerHTML = lastInputType === 'gamepad'
      ? 'RT Thrust \u2022 LS Steer<br>A Pitch Down \u2022 B Pitch Up<br>Y Auto-Return Home<br>LT Brake \u2022 Start Menu'
      : 'W Thrust \u2022 A/D Steer<br>Space Pitch Down \u2022 Shift Up<br>Y Auto-Return Home<br>S Brake \u2022 ESC Menu'
  } else if (onPlanet >= 0) {
    ctrlTitleEl.textContent = 'PLANET SURFACE'
    ctrlBodyEl.innerHTML = lastInputType === 'gamepad'
      ? 'RT/LT Drive \u2022 LS Steer<br>A Boost \u2022 B Launch Off<br>Y Return Home'
      : 'W/S Drive \u2022 A/D Steer<br>Space Boost \u2022 R Launch Off<br>Y Return Home'
  } else if (lastInputType === 'gamepad') {
    ctrlTitleEl.textContent = 'XBOX CONTROLLER'
    ctrlBodyEl.innerHTML = 'RT/LT Drive \u2022 LS Steer<br>A Boost \u2022 B Jump<br>X Reset \u2022 Y Fireworks<br>Start Menu \u2022 RS Camera'
  } else {
    ctrlTitleEl.textContent = 'KEYBOARD'
    ctrlBodyEl.innerHTML = 'W/S Drive \u2022 A/D Steer<br>Space Boost \u2022 R Reset<br>H Horn \u2022 ESC Menu'
  }
}

// ════════════════════════════════════════════════════════════
// CAMERA — chase cam
// ════════════════════════════════════════════════════════════
const camTarget = new THREE.Vector3()
const camPos = new THREE.Vector3(0, 14, 18)
let camOrbitX = 0, camOrbitY = 0 // right stick camera offset

function updateCamera(dt) {
  const p = carBody.position

  // ── Space flight camera ──
  if (spaceMode) {
    // Chase behind the flight direction
    const behind = _spaceDir.clone().negate()
    const spaceDist = 18 + Math.abs(carSpeed) * 0.08
    const ideal = new THREE.Vector3(
      p.x + behind.x * spaceDist + _spaceUp.x * 6,
      p.y + behind.y * spaceDist + _spaceUp.y * 6,
      p.z + behind.z * spaceDist + _spaceUp.z * 6
    )
    camPos.lerp(ideal, 1 - Math.pow(0.005, dt))
    camera.position.copy(camPos)
    camTarget.lerp(new THREE.Vector3(p.x, p.y, p.z), 1 - Math.pow(0.01, dt))
    camera.lookAt(camTarget)
    return
  }

  // ── Planet surface camera — close chase for curved racetrack feel ──
  if (onPlanet >= 0) {
    const pd = planetData[onPlanet]
    const surfUp = new THREE.Vector3().subVectors(p, pd.pos).normalize()
    // Get car forward from quaternion (car drives toward -Z locally)
    const carFwd = new THREE.Vector3(0, 0, -1).applyQuaternion(carGroup.quaternion)
    const behind = carFwd.clone().negate()
    // Tight camera — close and low for racetrack illusion
    const planDist = 10 + Math.abs(carSpeed) * 0.08
    const planHeight = 4 + Math.abs(carSpeed) * 0.04
    const ideal = new THREE.Vector3().copy(p)
      .add(behind.multiplyScalar(planDist))
      .add(surfUp.clone().multiplyScalar(planHeight))
    camPos.lerp(ideal, 1 - Math.pow(0.005, dt))
    camera.position.copy(camPos)
    // Look slightly ahead of the car for forward visibility
    const lookAhead = new THREE.Vector3().copy(p).add(carFwd.clone().multiplyScalar(5))
    camTarget.lerp(lookAhead, 1 - Math.pow(0.01, dt))
    camera.lookAt(camTarget)
    camera.up.copy(surfUp)
    return
  }

  // ── Normal ground camera ──
  camera.up.set(0, 1, 0) // reset up vector

  // Right joystick camera orbit
  const gp = navigator.getGamepads?.()[0]
  if (gp) {
    const rsX = Math.abs(gp.axes[2]) > 0.15 ? gp.axes[2] : 0
    const rsY = Math.abs(gp.axes[3]) > 0.15 ? gp.axes[3] : 0
    camOrbitX -= rsX * dt * 3  // negated to match natural feel
    camOrbitY = Math.max(-0.5, Math.min(0.8, camOrbitY - rsY * dt * 2))
  }
  // Decay orbit back to center when stick released
  camOrbitX *= (1 - dt * 2)
  camOrbitY *= (1 - dt * 2)

  const viewAngle = carAngle + camOrbitX
  const back = new THREE.Vector3(Math.sin(viewAngle), 0, Math.cos(viewAngle))
  const baseDist = camDists[opts.camera] || 11
  const baseHeight = camHeights[opts.camera] || 6.6
  const dist = baseDist + Math.abs(carSpeed) * 0.15
  const height = baseHeight + Math.abs(carSpeed) * 0.09 + camOrbitY * 5

  const ideal = new THREE.Vector3(p.x + back.x * dist, p.y + height, p.z + back.z * dist)
  camPos.lerp(ideal, 1 - Math.pow(0.02, dt))
  camera.position.copy(camPos)

  camTarget.lerp(new THREE.Vector3(p.x, p.y + 1, p.z), 1 - Math.pow(0.01, dt))
  camera.lookAt(camTarget)
}
