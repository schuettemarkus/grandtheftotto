function updateTitle() {
  if (!titleGroup.parent) return
  titleGroup.lookAt(camera.position)
  // Gentle float
  titleGroup.position.y = 12 + Math.sin(performance.now() * 0.001) * 0.5
  // Fade when player drives away
  const dist = _tv1.copy(carBody.position).length()
  const fade = Math.max(0, 1 - dist / 35)
  titleMesh.material.opacity = fade
  backGlow.material.opacity = fade * 0.08
  if (fade <= 0) scene.remove(titleGroup)
}

// ════════════════════════════════════════════════════════════
// INTRO SEQUENCE — clouds part, zoom to car (Simpsons-style)
// ════════════════════════════════════════════════════════════
let introActive = true
let introTime = 0
const introDuration = 4 // seconds
const introClouds = []

// Create cloud planes
const cloudMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.95, side: THREE.DoubleSide })
for (let i = 0; i < 20; i++) {
  const size = 20 + Math.random() * 30
  const cloud = new THREE.Mesh(new THREE.PlaneGeometry(size, size * 0.4), cloudMat.clone())
  const angle = Math.random() * Math.PI * 2
  const r = Math.random() * 30
  cloud.position.set(Math.cos(angle) * r, 20 + Math.random() * 15, Math.sin(angle) * r)
  cloud.lookAt(0, cloud.position.y, 0)
  cloud.rotation.z = Math.random() * 0.5
  scene.add(cloud)
  introClouds.push({ mesh: cloud, origX: cloud.position.x, origZ: cloud.position.z, dir: angle })
}

function updateIntro(dt) {
  if (!introActive) return
  introTime += dt

  const t = Math.min(introTime / introDuration, 1)

  // Clouds drift outward and fade
  for (const c of introClouds) {
    const spread = t * 60
    c.mesh.position.x = c.origX + Math.cos(c.dir) * spread
    c.mesh.position.z = c.origZ + Math.sin(c.dir) * spread
    c.mesh.material.opacity = Math.max(0, 0.95 - t * 1.5)
    c.mesh.position.y += dt * 2 // float up
  }

  // Camera: start high and far, zoom down to car
  if (t < 1) {
    const eased = 1 - Math.pow(1 - t, 3) // ease out cubic
    const startY = 80, endY = 8
    const startDist = 60, endDist = 12
    camera.position.set(
      Math.sin(t * 0.5) * (startDist - eased * (startDist - endDist)),
      startY - eased * (startY - endY),
      startDist - eased * (startDist - endDist)
    )
    camera.lookAt(0, 2, 0)
  }

  if (t >= 1) {
    introActive = false
    // Remove clouds
    for (const c of introClouds) scene.remove(c.mesh)
    introClouds.length = 0
    // Hide loading screen
    document.getElementById('loading').classList.add('done')
  }
}

// ════════════════════════════════════════════════════════════
// FEATURE: NORTHERN LIGHTS AURORA — shimmering curtains across the sky
// ════════════════════════════════════════════════════════════
const auroraCurtains = []
const auroraColors = [0x00ff88, 0x00ccff, 0x8844ff, 0x00ffcc]
for (let i = 0; i < 5; i++) {
  const w = 80 + Math.random() * 120, h = 30 + Math.random() * 20
  const geo = new THREE.PlaneGeometry(w, h, 20, 1)
  const mat = new THREE.MeshBasicMaterial({
    color: auroraColors[i % auroraColors.length],
    transparent: true, opacity: 0.06, side: THREE.DoubleSide,
  })
  const curtain = new THREE.Mesh(geo, mat)
  const angle = (i / 5) * Math.PI * 2
  curtain.position.set(Math.cos(angle) * 200, 120 + Math.random() * 40, Math.sin(angle) * 200)
  curtain.rotation.y = angle + Math.PI / 2
  scene.add(curtain)
  auroraCurtains.push({ mesh: curtain, phase: Math.random() * Math.PI * 2, speed: 0.3 + Math.random() * 0.4 })
}

let _auroraFrame = 0
function updateAurora(dt) {
  _auroraFrame++
  if (_auroraFrame % 4 !== 0) return // update every 4th frame
  for (const a of auroraCurtains) {
    a.phase += dt * 4 * a.speed // compensate for skipped frames
    const pos = a.mesh.geometry.attributes.position
    for (let i = 0; i < pos.count; i++) {
      const x = pos.getX(i)
      pos.setY(i, pos.getY(i) + Math.sin(a.phase + x * 0.05) * 0.15)
    }
    pos.needsUpdate = true
    a.mesh.material.opacity = 0.04 + Math.sin(a.phase * 0.7) * 0.025
  }
}

// ════════════════════════════════════════════════════════════
// FEATURE: WARP TUNNEL — edge-of-screen streaking lines
// ════════════════════════════════════════════════════════════
const warpLines = []
for (let i = 0; i < 24; i++) {
  const len = 4 + Math.random() * 8
  const geo = new THREE.BoxGeometry(0.05, 0.05, len)
  const mat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0 })
  const line = new THREE.Mesh(geo, mat)
  line.visible = false
  scene.add(line)
  const theta = (i / 24) * Math.PI * 2 + Math.random() * 0.15
  const radius = 8 + Math.random() * 5 // distance from camera center (screen edges)
  warpLines.push({
    mesh: line, theta, radius, len,
    speed: 30 + Math.random() * 40,
    z: Math.random() * 25,
  })
}

function updateWarpLines(dt) {
  const spd = Math.abs(carSpeed)
  // Active when: boosting fast, in space mode, or approaching a planet
  const active = (spd > 25 && boosting) || spaceMode || _approachingPlanet
  const intensity = spaceMode ? 1 : (spd > 25 ? Math.min(1, (spd - 25) / 20) : (_approachingPlanet ? 0.7 : 0))

  // Compute camera axes once outside loop (not per-line)
  const wFwd = _tv1.set(0, 0, -1).applyQuaternion(camera.quaternion)
  const wRight = _tv2.set(1, 0, 0).applyQuaternion(camera.quaternion)
  const wUp = _tv3.set(0, 1, 0).applyQuaternion(camera.quaternion)

  for (const w of warpLines) {
    w.mesh.visible = active
    if (!active) continue
    w.z -= w.speed * dt * (spaceMode ? 1.5 : 1)
    if (w.z < -12) w.z = 12 + Math.random() * 15

    const cx = Math.cos(w.theta) * w.radius
    const cy = Math.sin(w.theta) * w.radius
    w.mesh.position.copy(camera.position)
      .addScaledVector(wFwd, w.z)
      .addScaledVector(wRight, cx)
      .addScaledVector(wUp, cy)
    w.mesh.quaternion.copy(camera.quaternion)

    const alpha = intensity * 0.5
    w.mesh.material.opacity = alpha
    // Color: white → blue in space, orange when approaching planet
    if (_approachingPlanet) {
      w.mesh.material.color.setHex(0xff8844)
    } else if (spaceMode) {
      w.mesh.material.color.setHSL(0.6, 0.6, 0.8)
    } else {
      w.mesh.material.color.setHSL(0, 0, 1)
    }
  }
}
let _approachingPlanet = false

// ════════════════════════════════════════════════════════════
// OFF-MAP CHECK + SPACE MODE TRANSITIONS
// ════════════════════════════════════════════════════════════
function checkBounds() {
  const p = carBody.position
  // Extended map: x: -195 to +195, z: -595 to +195 (Nova Land extends north)
  const offMap = Math.abs(p.x) > 195 || p.z > 195 || p.z < -595

  // If on a planet, don't reset
  if (onPlanet >= 0) return
  // If airborne and going off-map, enter space mode
  if (offMap && isAirborne) {
    if (!spaceMode) enterSpaceMode()
    return
  }
  // In space mode, check if returning to map
  if (spaceMode) {
    const distToHome = Math.sqrt(p.x*p.x + p.z*p.z)
    if (distToHome < 190 && p.y < 20) {
      exitSpaceMode()
    }
    return
  }
  // Normal ground check — only reset if on ground and way off
  if (offMap || p.y < -10) {
    carBody.position.set(0, 3, 0)
    carBody.velocity.setZero()
    carBody.angularVelocity.setZero()
    carAngle = 0; carSpeed = 0
    spaceMode = false; onPlanet = -1
  }
}

function enterSpaceMode() {
  spaceMode = true
  spaceYaw = carAngle
  // Preserve current velocity direction as initial flight angle
  const vel = carBody.velocity
  const hSpeed = Math.sqrt(vel.x * vel.x + vel.z * vel.z)
  spacePitch = hSpeed > 1 ? Math.atan2(vel.y, hSpeed) : 0.15 // slight upward if slow
  // Compute initial flight direction from actual velocity
  if (hSpeed > 1) {
    _spaceDir.set(vel.x, vel.y, vel.z).normalize()
    spaceYaw = Math.atan2(-vel.x, -vel.z)
  }
  carBody.type = CANNON.Body.KINEMATIC
  deploySuperGlider()
  // Lazy-load planet atmospheres + portals on first space entry
  for (const pd of planetData) {
    if (!pd._loaded) {
      pd._loaded = true
      scene.add(pd.atmo)
      scene.add(pd.portal)
    }
  }
}

function exitSpaceMode() {
  spaceMode = false
  onPlanet = -1
  // Restore physics
  carBody.type = CANNON.Body.DYNAMIC
  carBody.velocity.set(0, -5, 0) // gentle descent
  carBody.angularVelocity.setZero()
  carBody.quaternion.setFromEuler(0, carAngle, 0)
  removeSuperGlider()
  // Remove normal glider too
  if (carGroup.userData.gliderL) {
    carGroup.remove(carGroup.userData.gliderL)
    carGroup.remove(carGroup.userData.gliderR)
    delete carGroup.userData.gliderL
    delete carGroup.userData.gliderR
  }
}

// Super glider — large delta wings for space flight
function deploySuperGlider() {
  if (carGroup.userData.superGliderL) return
  const gMat = new THREE.MeshStandardMaterial({ color: 0x44aaff, emissive: 0x2266ff, emissiveIntensity: 0.8, transparent: true, opacity: 0.7, side: THREE.DoubleSide })
  // Delta wing left
  const geoL = new THREE.BufferGeometry()
  const vL = new Float32Array([0,0,carL*0.3, -carW*3,0,0, -carW*1.5,0,-carL*0.4, 0,0,-carL*0.3])
  geoL.setAttribute('position', new THREE.BufferAttribute(vL,3)); geoL.setIndex([0,1,2,0,2,3]); geoL.computeVertexNormals()
  const wL = new THREE.Mesh(geoL, gMat)
  wL.position.set(-carW*0.3, carH*0.2, 0)
  carGroup.add(wL)
  carGroup.userData.superGliderL = wL
  // Delta wing right
  const geoR = new THREE.BufferGeometry()
  const vR = new Float32Array([0,0,carL*0.3, carW*3,0,0, carW*1.5,0,-carL*0.4, 0,0,-carL*0.3])
  geoR.setAttribute('position', new THREE.BufferAttribute(vR,3)); geoR.setIndex([0,1,2,0,2,3]); geoR.computeVertexNormals()
  const wR = new THREE.Mesh(geoR, gMat)
  wR.position.set(carW*0.3, carH*0.2, 0)
  carGroup.add(wR)
  carGroup.userData.superGliderR = wR
  // Engine glow at rear
  const eMat = new THREE.MeshBasicMaterial({ color: 0x44aaff, transparent: true, opacity: 0.6 })
  const eng = new THREE.Mesh(new THREE.SphereGeometry(0.8, 6, 6), eMat)
  eng.position.set(0, 0, carL*0.55)
  carGroup.add(eng)
  carGroup.userData.superGliderEng = eng
  // Remove normal glider if present
  if (carGroup.userData.gliderL) {
    carGroup.remove(carGroup.userData.gliderL)
    carGroup.remove(carGroup.userData.gliderR)
    delete carGroup.userData.gliderL
    delete carGroup.userData.gliderR
  }
}

function removeSuperGlider() {
  if (carGroup.userData.superGliderL) {
    carGroup.remove(carGroup.userData.superGliderL)
    carGroup.remove(carGroup.userData.superGliderR)
    carGroup.remove(carGroup.userData.superGliderEng)
    delete carGroup.userData.superGliderL
    delete carGroup.userData.superGliderR
    delete carGroup.userData.superGliderEng
  }
}

// ════════════════════════════════════════════════════════════
// DAY/NIGHT CYCLE — 2 minute full cycle
// ════════════════════════════════════════════════════════════
let timeOfDay = 0.3 // start at morning (0=midnight, 0.25=sunrise, 0.5=noon, 0.75=sunset)
const hemiLight = scene.children.find(c => c.isHemisphereLight)
const origBg = new THREE.Color(0x020010)

// ════════════════════════════════════════════════════════════
// NOVA LAND ZONE TRANSITION
// ════════════════════════════════════════════════════════════
let novaTransition = 0 // 0=normal world, 1=fully in nova land

function updateNovaLand(dt) {
  if (spaceMode || onPlanet >= 0) return

  const wasInNova = inNovaLand
  inNovaLand = carBody.position.z < -200

  // Smooth transition factor
  const target = inNovaLand ? 1 : 0
  novaTransition += (target - novaTransition) * Math.min(1, dt * 3)

  // Car skin — auto-swap to Barbie in Nova Land (unless manually set)
  if (inNovaLand && !wasInNova && opts.carSkin === 0) {
    applyCarSkin(1) // swap to Barbie
  } else if (!inNovaLand && wasInNova && opts.carSkin === 0) {
    applyCarSkin(0) // restore WRX
  }

  // Sky/clouds transition
  for (const cloud of novaClouds) {
    cloud.material.opacity = novaTransition * 0.6
    // Gentle drift
    cloud.position.x += dt * 2
    if (cloud.position.x > 200) cloud.position.x -= 400
  }

  // Nova Land title
  const titleDist = Math.abs(carBody.position.z - (-225))
  const titleFade = inNovaLand ? Math.max(0, 1 - titleDist / 40) : 0
  novaTitleMesh.material.opacity = titleFade
  novaTitleGroup.lookAt(camera.position)
  novaTitleGroup.position.y = 12 + Math.sin(performance.now() * 0.001) * 0.5

  // Boundary strip pulse
  boundaryMat.opacity = 0.2 + Math.sin(performance.now() * 0.003) * 0.1

  // Update game mode display
  if (inNovaLand && !spaceMode && onPlanet < 0) {
    gameModeEl.textContent = 'NOVA LAND'
    gameModeEl.style.color = '#ff69b4'
  } else if (!inNovaLand && !spaceMode && onPlanet < 0) {
    gameModeEl.style.color = '#ffd700'
  }
}

function updateDayNight(dt) {
  if (spaceMode || onPlanet >= 0) return // freeze cycle in space

  // Only auto-cycle in Auto mode
  if (opts.dayNight === 0) timeOfDay = (timeOfDay + dt / 120) % 1 // 120s = 2 min full cycle

  // Sun position — arcs across the sky
  const sunAngle = timeOfDay * Math.PI * 2 - Math.PI / 2 // -90° at midnight
  const sunHeight = Math.sin(sunAngle)
  const sunX = Math.cos(sunAngle) * 50
  sun.position.set(sunX, Math.max(2, sunHeight * 60), 20)

  // Sun intensity — bright during day, 30% at night (never fully dark)
  const dayFactor = Math.max(0, sunHeight) // 0 at night, 1 at noon
  sun.intensity = 0.5 + dayFactor * 1.2
  if (hemiLight) hemiLight.intensity = 0.35 + dayFactor * 0.5

  // Sky color — dark blue at night, light blue at day, orange at sunrise/sunset
  const isTransition = Math.abs(sunHeight) < 0.3
  if (dayFactor > 0.1) {
    const skyR = isTransition ? 0.4 + dayFactor * 0.2 : 0.3 + dayFactor * 0.2
    const skyG = isTransition ? 0.25 + dayFactor * 0.4 : 0.45 + dayFactor * 0.35
    const skyB = isTransition ? 0.2 + dayFactor * 0.3 : 0.6 + dayFactor * 0.3
    scene.background.setRGB(skyR * 0.15, skyG * 0.15, skyB * 0.2)
  } else {
    // Night — not pitch black, keep ~30% brightness
    scene.background.setRGB(0.02, 0.015, 0.04)
  }

  // Stars opacity — bright at night, invisible during day
  const starOpacity = Math.max(0, 1 - dayFactor * 3)
  starMat.opacity = starOpacity * 0.9

  // Headlight intensity — brighter at night (using cached refs)
  const headlightIntensity = 1 + (1 - dayFactor) * 3
  for (const hl of _cachedHeadlights) hl.material.emissiveIntensity = headlightIntensity

  const nightFactor = Math.max(0, 1 - dayFactor * 2.5)

  // Planet glow — brighter at night
  for (const pd of planetData) {
    pd.mesh.material.emissiveIntensity = 0.1 + nightFactor * 0.3
    if (pd._loaded) pd.atmo.material.opacity = 0.06 + nightFactor * 0.08
  }

  // Nebula glow brighter at night (cached refs)
  for (const neb of nebulaMeshes) neb.material.opacity = 0.04 + nightFactor * 0.06

  // Tone mapping exposure — never below 0.8 (70% brightness at night)
  renderer.toneMappingExposure = 0.8 + dayFactor * 0.5
}

// ════════════════════════════════════════════════════════════
// TIRE TRACKS — persistent marks on ground
// ════════════════════════════════════════════════════════════
const tireTrackSegs = []
const maxTrackSegs = 200
const trackGeo = new THREE.PlaneGeometry(0.4, 1.5)
const trackMat = new THREE.MeshBasicMaterial({ color: 0x222211, transparent: true, opacity: 0.35, depthWrite: false })
let _lastTrackFrame = 0

function updateTireTracks(dt) {
  if (spaceMode || onPlanet >= 0) return
  _lastTrackFrame++

  // Create track marks when drifting or driving fast
  const absSpd = Math.abs(carSpeed)
  const shouldMark = (_isDrifting || absSpd > 12) && !isAirborne && _lastTrackFrame % 3 === 0
  if (shouldMark) {
    for (const side of [-1, 1]) {
      // Position at rear wheels
      const wx = carBody.position.x + Math.cos(carAngle) * side * carW * 0.35 + Math.sin(carAngle) * carL * 0.32
      const wz = carBody.position.z - Math.sin(carAngle) * side * carW * 0.35 + Math.cos(carAngle) * carL * 0.32
      const seg = new THREE.Mesh(trackGeo, trackMat.clone())
      seg.position.set(wx, 0.02, wz)
      seg.rotation.x = -Math.PI / 2
      seg.rotation.z = -carAngle
      seg.material.opacity = _isDrifting ? 0.4 : 0.15
      scene.add(seg)
      tireTrackSegs.push({ mesh: seg, life: 1, maxLife: 1 })
    }
  }

  // Fade old tracks
  for (let i = tireTrackSegs.length - 1; i >= 0; i--) {
    const t = tireTrackSegs[i]
    t.life -= dt * 0.03 // slow fade ~33 seconds
    t.mesh.material.opacity = t.life * (_isDrifting ? 0.4 : 0.25)
    if (t.life <= 0 || tireTrackSegs.length > maxTrackSegs) {
      scene.remove(t.mesh)
      tireTrackSegs.splice(i, 1)
    }
  }
}

// ════════════════════════════════════════════════════════════
// STUNT SCORE — air time, near misses, drift combos
// ════════════════════════════════════════════════════════════
let stuntScore = 0
let stuntCombo = 0
let stuntComboTimer = 0
let airTimer = 0
let wasAirborne = false
const stuntPopup = document.getElementById('stunt-popup')

function showStuntPopup(text, pts) {
  stuntPopup.textContent = text + ' +' + pts
  stuntPopup.classList.add('show')
  setTimeout(() => stuntPopup.classList.remove('show'), 1200)
}

function updateStunts(dt) {
  if (spaceMode || onPlanet >= 0) return

  // Combo timer decay
  if (stuntComboTimer > 0) {
    stuntComboTimer -= dt
    if (stuntComboTimer <= 0) stuntCombo = 0
  }

  // Air time tracking
  if (isAirborne) {
    airTimer += dt
  } else if (wasAirborne && airTimer > 0.8) {
    // Landed after air time
    const pts = Math.floor(airTimer * 30) * Math.max(1, stuntCombo)
    stuntScore += pts
    stuntCombo++
    stuntComboTimer = 3
    const label = airTimer > 3 ? 'MEGA AIR' : airTimer > 1.5 ? 'BIG AIR' : 'AIR TIME'
    showStuntPopup(label + (stuntCombo > 1 ? ' x' + stuntCombo : ''), pts)
    airTimer = 0
  } else {
    airTimer = 0
  }
  wasAirborne = isAirborne

  // Near miss detection — creature within 4 units at high speed without collision
  if (!isAirborne && Math.abs(carSpeed) > 15) {
    for (const c of creatureList) {
      if (c.eaten || c._hitCooldown || c._nearMissCd) continue
      const dx = carBody.position.x - c.x, dz = carBody.position.z - c.z
      const dist = Math.sqrt(dx*dx + dz*dz)
      if (dist > 3 && dist < 6) {
        c._nearMissCd = true
        setTimeout(() => c._nearMissCd = false, 2000)
        const pts = 25 * Math.max(1, stuntCombo)
        stuntScore += pts
        stuntCombo++
        stuntComboTimer = 3
        showStuntPopup('NEAR MISS' + (stuntCombo > 1 ? ' x' + stuntCombo : ''), pts)
      }
    }
  }
}

// ════════════════════════════════════════════════════════════
// SPACE FLIGHT + PLANET SYSTEM
// ════════════════════════════════════════════════════════════
const _spaceDir = new THREE.Vector3(0, 0, -1) // current flight direction
const _spaceUp = new THREE.Vector3(0, 1, 0)
const _spaceQuat = new THREE.Quaternion()
let nearestPlanetIdx = -1
let planetDiscoveryTimer = 0

// HUD elements for space
const spaceHudEl = document.createElement('div')
spaceHudEl.style.cssText = 'position:fixed;top:50%;left:14px;transform:translateY(-50%);pointer-events:none;z-index:10;font-family:monospace;color:#44aaff;display:none'
document.body.appendChild(spaceHudEl)

// Home compass arrow
const compassEl = document.createElement('div')
compassEl.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);pointer-events:none;z-index:10;font:bold 0.8rem monospace;color:#44ff88;display:none;text-align:center'
document.body.appendChild(compassEl)

function updateSpaceFlight(dt) {
  if (!spaceMode && onPlanet < 0) {
    spaceHudEl.style.display = 'none'
    compassEl.style.display = 'none'
    _approachingPlanet = false
    return
  }

  // Read inputs
  const gp = navigator.getGamepads?.()[0]
  const gpRT = gp?.buttons[7]?.value || 0
  const gpLT = gp?.buttons[6]?.value || 0
  const gpStickX = gp ? (Math.abs(gp.axes[0]) > 0.15 ? gp.axes[0] : 0) : 0
  const gpStickY = gp ? (Math.abs(gp.axes[1]) > 0.15 ? gp.axes[1] : 0) : 0
  const kbFwd = (keys['ArrowUp'] || keys['KeyW']) ? 1 : 0
  const kbRev = (keys['ArrowDown'] || keys['KeyS']) ? 1 : 0
  const kbLeft = (keys['ArrowLeft'] || keys['KeyA']) ? 1 : 0
  const kbRight = (keys['ArrowRight'] || keys['KeyD']) ? 1 : 0
  const pitchUp = keys['Space'] || gp?.buttons[0]?.pressed ? 1 : 0
  const pitchDn = keys['ShiftLeft'] || gp?.buttons[1]?.pressed ? 1 : 0

  // ── Planet surface driving (curved racetrack illusion) ──
  if (onPlanet >= 0) {
    const pd = planetData[onPlanet]

    // Standard ground-style driving (same as home map)
    const thrust = (kbFwd || gpRT > 0.15) ? 1 : ((kbRev || gpLT > 0.15) ? -1 : 0)
    const steer = (kbLeft - kbRight) || -gpStickX
    boosting = keys['Space'] || gp?.buttons[0]?.pressed || false
    const spdMul = boosting ? 2.5 : 1

    if (thrust !== 0) {
      carSpeed = Math.min(Math.max(carSpeed + thrust * accel * spdMul * dt, -maxSpeed * 0.4), maxSpeed * spdMul)
    } else {
      carSpeed *= (1 - 2 * dt)
      if (Math.abs(carSpeed) < 0.1) carSpeed = 0
    }

    if (Math.abs(carSpeed) > 0.5 && Math.abs(steer) > 0) {
      carAngle += steer * turnSpeed * dt * Math.sign(carSpeed)
    }

    // Move car on the planet's local "ground plane" (car drives flat relative to planet center)
    // Car position is offset from planet center — we store a local 2D offset
    if (!pd._localX) { pd._localX = 0; pd._localZ = 0 }
    pd._localX += -Math.sin(carAngle) * carSpeed * dt
    pd._localZ += -Math.cos(carAngle) * carSpeed * dt

    // Wrap around — when car goes far, wrap position so it loops around the planet
    const wrapDist = pd.radius * 1.5
    if (pd._localX > wrapDist) pd._localX -= wrapDist * 2
    if (pd._localX < -wrapDist) pd._localX += wrapDist * 2
    if (pd._localZ > wrapDist) pd._localZ -= wrapDist * 2
    if (pd._localZ < -wrapDist) pd._localZ += wrapDist * 2

    // Map local 2D position onto sphere surface for curved globe illusion
    const angX = pd._localX / pd.radius
    const angZ = pd._localZ / pd.radius
    const surfUp = _tv1.set(
      Math.sin(angX) * Math.cos(angZ),
      Math.cos(angX) * Math.cos(angZ),
      Math.sin(angZ)
    ).normalize()
    const worldPos = _tv2.copy(pd.pos).addScaledVector(surfUp, pd.radius + carH * 0.5)
    carBody.position.copy(worldPos)
    carBody.velocity.setZero()
    carBody.angularVelocity.setZero()

    // Orient car: up = surface normal
    const carFwd = _tv3.set(-Math.sin(carAngle), 0, -Math.cos(carAngle))
    carFwd.addScaledVector(surfUp, -carFwd.dot(surfUp)).normalize()
    if (carFwd.lengthSq() < 0.01) carFwd.set(1, 0, 0)
    const carRight = _tv4.crossVectors(surfUp, carFwd).normalize()
    carFwd.crossVectors(carRight, surfUp).normalize()
    _tm1.makeBasis(carRight, surfUp, carFwd.negate())
    _tq1.setFromRotationMatrix(_tm1)
    carBody.quaternion.set(_tq1.x, _tq1.y, _tq1.z, _tq1.w)

    // B button = launch off planet into space
    const jumpBtn = gp?.buttons[1]?.pressed || false
    if ((jumpBtn && !keys._gpPlanetJump) || keys['KeyR']) {
      if (jumpBtn) { keys._gpPlanetJump = true; setTimeout(() => keys._gpPlanetJump = false, 400) }
      onPlanet = -1
      pd._localX = 0; pd._localZ = 0
      enterSpaceMode()
      const launchPos = _tv5.copy(pd.pos).addScaledVector(surfUp, pd.radius + 15)
      carBody.position.copy(launchPos)
      _spaceDir.copy(surfUp)
      spaceYaw = carAngle; spacePitch = 0.3
      return
    }

    // Y button = return home (same as space mode)
    const goHome = keys['KeyY'] || gp?.buttons[3]?.pressed || false
    if (goHome && !keys._gpPlanetHome) {
      keys._gpPlanetHome = true
      onPlanet = -1
      pd._localX = 0; pd._localZ = 0
      spaceMode = false
      carBody.type = CANNON.Body.DYNAMIC
      carBody.position.set(0, 5, 0)
      carBody.velocity.setZero()
      carBody.angularVelocity.setZero()
      carAngle = 0; carSpeed = 0
      removeSuperGlider()
      camera.up.set(0, 1, 0)
      puToast.textContent = 'RETURNED HOME'
      puToast.style.color = '#44ff88'
      puToast.style.opacity = '1'
      setTimeout(() => { puToast.style.opacity = '0'; keys._gpPlanetHome = false }, 2000)
      return
    }

    // HUD
    spaceHudEl.style.display = 'block'
    spaceHudEl.innerHTML = '<div style="color:#ffd700;font-size:1.1rem;margin-bottom:4px">' + pd.name.toUpperCase() + '</div><div style="font-size:0.65rem;color:#aaa">B/R launch off \u2022 Y go home</div>'
    compassEl.style.display = 'none'
    gameModeEl.textContent = pd.name.toUpperCase()
    return
  }

  // ── Free space flight ──
  spaceHudEl.style.display = 'block'
  compassEl.style.display = 'block'

  // Yaw (left/right)
  const yawInput = (kbLeft - kbRight) || -gpStickX
  // Pitch (inverted — press up/Space to pitch DOWN toward planets, press down/Shift to pitch UP)
  const pitchInput = (pitchDn - pitchUp) || gpStickY
  // Thrust
  const thrustInput = (kbFwd || gpRT > 0.15) ? 1 : ((kbRev || gpLT > 0.15) ? -0.3 : 0)

  // Update orientation
  spaceYaw += yawInput * 2.5 * dt
  spacePitch = Math.max(-Math.PI * 0.45, Math.min(Math.PI * 0.45, spacePitch + pitchInput * 2 * dt))

  // Compute flight direction from yaw + pitch
  _spaceDir.set(
    -Math.sin(spaceYaw) * Math.cos(spacePitch),
    Math.sin(spacePitch),
    -Math.cos(spaceYaw) * Math.cos(spacePitch)
  ).normalize()

  // Y button (keyboard Y or gamepad Y/buttons[3]) = auto-fly home
  const autoHome = keys['KeyY'] || gp?.buttons[3]?.pressed || false

  // Speed
  boosting = keys['Space'] || gp?.buttons[0]?.pressed || false
  const spaceMaxSpeed = boosting || autoHome ? 120 : 50
  if (autoHome) {
    // Auto-pilot toward home — override direction to point at origin
    const homeTarget = new THREE.Vector3(-carBody.position.x, -carBody.position.y, -carBody.position.z).normalize()
    // Smoothly rotate toward home
    _spaceDir.lerp(homeTarget, dt * 3).normalize()
    // Recompute yaw/pitch from direction so releasing Y continues smoothly
    spaceYaw = Math.atan2(-_spaceDir.x, -_spaceDir.z)
    spacePitch = Math.asin(Math.max(-1, Math.min(1, _spaceDir.y)))
    // Full speed toward home
    carSpeed = Math.min(carSpeed + 60 * dt, spaceMaxSpeed)
  } else if (thrustInput > 0) {
    carSpeed = Math.min(carSpeed + 30 * dt * (boosting ? 3 : 1), spaceMaxSpeed)
  } else if (thrustInput < 0) {
    carSpeed = Math.max(carSpeed - 20 * dt, 0)
  } else {
    carSpeed *= (1 - 0.5 * dt) // slow drift-down in space
  }

  // Move
  const spaceVel = _spaceDir.clone().multiplyScalar(carSpeed)
  carBody.position.x += spaceVel.x * dt
  carBody.position.y += spaceVel.y * dt
  carBody.position.z += spaceVel.z * dt
  carBody.velocity.setZero()

  // Orient car to flight direction
  _spaceUp.set(0, 1, 0)
  const right = new THREE.Vector3().crossVectors(_spaceDir, _spaceUp).normalize()
  if (right.lengthSq() < 0.01) right.set(1, 0, 0)
  _spaceUp.crossVectors(right, _spaceDir).normalize()
  const rotMat = new THREE.Matrix4().makeBasis(right, _spaceUp, _spaceDir.clone().negate())
  _spaceQuat.setFromRotationMatrix(rotMat)
  carBody.quaternion.set(_spaceQuat.x, _spaceQuat.y, _spaceQuat.z, _spaceQuat.w)

  // Engine glow pulse
  if (carGroup.userData.superGliderEng) {
    const eng = carGroup.userData.superGliderEng
    const glow = 0.3 + (carSpeed / spaceMaxSpeed) * 0.7
    eng.material.opacity = glow
    eng.scale.setScalar(0.8 + (carSpeed / spaceMaxSpeed) * 1.5)
  }

  // ── Planet proximity check ──
  nearestPlanetIdx = -1
  let nearestDist = Infinity
  _approachingPlanet = false
  for (let i = 0; i < planetData.length; i++) {
    const pd = planetData[i]
    const dist = new THREE.Vector3().subVectors(carBody.position, pd.pos).length()
    if (dist < nearestDist) { nearestDist = dist; nearestPlanetIdx = i }

    // Approaching — within 4x radius
    if (dist < pd.radius * 4) {
      _approachingPlanet = true
    }

    // Landing — within radius + generous buffer so car doesn't clip into planet
    if (dist < pd.radius + 15) {
      // Land on planet — enter rounded surface driving mode
      onPlanet = i
      spaceMode = false
      carBody.type = CANNON.Body.KINEMATIC
      carSpeed = Math.min(Math.abs(carSpeed), 15) * Math.sign(carSpeed || 1)

      // Place safely on surface (not inside)
      const toSurface = _tv1.subVectors(carBody.position, pd.pos).normalize()
      carBody.position.copy(pd.pos).addScaledVector(toSurface, pd.radius + carH * 0.5 + 1)
      carBody.velocity.setZero()
      carBody.angularVelocity.setZero()

      // Init local planet coordinates
      pd._localX = 0; pd._localZ = 0

      // Discovery popup
      if (!pd.discovered) {
        pd.discovered = true
        puToast.textContent = 'DISCOVERED: ' + pd.name.toUpperCase() + '!'
        puToast.style.color = '#ffd700'
        puToast.style.opacity = '1'
        setTimeout(() => puToast.style.opacity = '0', 3000)
        spawnFireworks()
      }
      removeSuperGlider()
      return
    }
  }

  // HUD — nearest planet info + compass
  if (nearestPlanetIdx >= 0) {
    const pd = planetData[nearestPlanetIdx]
    const dist = Math.floor(nearestDist)
    const approaching = nearestDist < pd.radius * 4
    spaceHudEl.innerHTML = '<div style="color:#44aaff;font-size:0.85rem;margin-bottom:4px">SPACE FLIGHT</div>' +
      '<div style="color:' + (approaching ? '#ffaa00' : '#888') + ';font-size:0.75rem">' +
      (approaching ? 'APPROACHING ' : 'Nearest: ') + pd.name + '</div>' +
      '<div style="font-size:0.7rem;color:#666">Distance: ' + dist + 'm</div>'
  }

  // Home compass
  const homeDir = new THREE.Vector3(-carBody.position.x, -carBody.position.y, -carBody.position.z).normalize()
  const homeDist = Math.floor(Math.sqrt(carBody.position.x**2 + carBody.position.y**2 + carBody.position.z**2))
  // Project home direction to screen space for arrow
  const screenHome = homeDir.clone().project(camera)
  const angle = Math.atan2(screenHome.y, screenHome.x)
  const arrows = ['\u2192','\u2197','\u2191','\u2196','\u2190','\u2199','\u2193','\u2198']
  const arrowIdx = Math.round(((angle + Math.PI) / (Math.PI * 2)) * 8) % 8
  const autoLabel = autoHome ? ' <span style="color:#ffd700">RETURNING...</span>' : ''
  compassEl.innerHTML = '<span style="font-size:1.2rem">' + arrows[arrowIdx] + '</span> HOME ' + homeDist + 'm' + autoLabel
  compassEl.style.display = 'block'

  gameModeEl.textContent = 'SPACE FLIGHT'
}

// ════════════════════════════════════════════════════════════
// GAME LOOP
// ════════════════════════════════════════════════════════════
let lastTime = performance.now()

function loop() {
  requestAnimationFrame(loop)
  const now = performance.now()
  const dt = Math.min((now - lastTime) / 1000, 0.05)
  lastTime = now

  // Intro overrides car control and camera
  if (introActive) {
    updateIntro(dt)
    world.step(1/60, dt, 3)
    carGroup.position.copy(carBody.position)
    carGroup.quaternion.copy(carBody.quaternion)
    updateSpace(dt)
    renderer.render(scene, camera)
    return
  }

  updateCar(dt)
  updateSpaceFlight(dt)
  if (!spaceMode && onPlanet < 0) world.step(1/60, dt, 3)

  carGroup.position.copy(carBody.position)
  carGroup.quaternion.copy(carBody.quaternion)

  const wheelSpin = carSpeed * dt * 3
  for (const w of wheels) {
    w.children[0].rotation.x += wheelSpin
    w.children[1].rotation.x += wheelSpin
  }

  for (const { body, mesh } of syncList) {
    mesh.position.copy(body.position)
    mesh.quaternion.copy(body.quaternion)
  }

  updateCamera(dt)
  updateTitle()
  updateSpace(dt)
  if (opts.creatures) updateCreatures(dt)
  updatePowerups(dt)
  updateAurora(dt)
  updateWarpLines(dt)
  updateFireworks(dt)
  updateTrail(dt)
  updateCoins()
  updateHUD(dt)
  updateNovaLand(dt)
  updateDayNight(dt)
  updateTireTracks(dt)
  updateStunts(dt)
  checkBounds()
  // Sound engine
  if (opts.sound) AudioEngine.updateEngine(carSpeed, boosting, isAirborne)

  if (menuOpen) { renderer.render(scene, camera); return } // still render but don't process input further
  renderer.render(scene, camera)
}

loop()
</script>
</body>
</html>
