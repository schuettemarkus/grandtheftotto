<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grand Theft Otto</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{overflow:hidden;height:100%;background:#1a1a2e;font-family:'Segoe UI',sans-serif}
canvas{display:block;position:fixed;top:0;left:0}
#hud{position:fixed;bottom:20px;left:20px;color:#fff;font-family:monospace;pointer-events:none;z-index:10}
#hud .speed{font-size:2rem;font-weight:bold}
#hud .info{font-size:0.75rem;color:#aaa;margin-top:4px}
#loading{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1a1a2e;color:#fff;transition:opacity 0.8s}
#loading.done{opacity:0;pointer-events:none}
#loading h1{font-size:2.5rem;color:#ffd700;letter-spacing:0.15em;margin-bottom:0.5rem}
#loading p{color:#888;font-size:0.9rem}
</style>
</head>
<body>
<div id="loading">
  <h1>GRAND THEFT OTTO</h1>
  <div style="width:40px;height:4px;background:#333;border-radius:2px;margin-top:12px;overflow:hidden">
    <div style="width:60%;height:100%;background:#ffd700;border-radius:2px;animation:pulse 1s ease-in-out infinite alternate"></div>
  </div>
  <style>@keyframes pulse{from{width:20%}to{width:90%}}</style>
</div>
<!-- Options Menu -->
<div id="opts" style="position:fixed;inset:0;z-index:80;display:none;background:rgba(0,0,0,0.85);font-family:'Segoe UI',sans-serif;color:#fff">
  <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:380px;background:rgba(30,30,30,0.95);border:1px solid #444;border-radius:12px;padding:28px;text-align:center">
    <h2 style="color:#ffd700;font-size:1.5rem;margin-bottom:18px;letter-spacing:0.1em">OPTIONS</h2>
    <div id="opt-list"></div>
    <button id="opt-resume" style="margin-top:18px;padding:10px 32px;background:#ffd700;color:#111;border:none;border-radius:6px;cursor:pointer;font-weight:bold;font-size:1rem">RESUME</button>
  </div>
</div>
<div id="hud">
  <div class="speed" id="spd">0 km/h</div>
  <div class="info">WASD / Arrows: Drive &nbsp; Space: Boost &nbsp; R: Reset</div>
</div>
<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js'
import * as CANNON from 'https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js'

// ════════════════════════════════════════════════════════════
// SCENE, CAMERA, RENDERER
// ════════════════════════════════════════════════════════════
const scene = new THREE.Scene()
scene.background = new THREE.Color(0x020010)
// No scene fog — space is visible, map is lit by sun

const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 2000)
camera.position.set(0, 12, 15)

const renderer = new THREE.WebGLRenderer({ antialias: true })
renderer.setSize(innerWidth, innerHeight)
renderer.setPixelRatio(Math.min(devicePixelRatio, 2))
renderer.shadowMap.enabled = true
renderer.shadowMap.type = THREE.PCFSoftShadowMap
renderer.toneMapping = THREE.ACESFilmicToneMapping
renderer.toneMappingExposure = 1.1
document.body.appendChild(renderer.domElement)

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight
  camera.updateProjectionMatrix()
  renderer.setSize(innerWidth, innerHeight)
})

// ════════════════════════════════════════════════════════════
// LIGHTS
// ════════════════════════════════════════════════════════════
scene.add(new THREE.HemisphereLight(0x88bbee, 0x445500, 0.8))
const sun = new THREE.DirectionalLight(0xffffff, 1.5)
sun.position.set(30, 50, 20)
sun.castShadow = true
sun.shadow.camera.left = -50; sun.shadow.camera.right = 50
sun.shadow.camera.top = 50; sun.shadow.camera.bottom = -50
sun.shadow.camera.far = 120
sun.shadow.mapSize.set(2048, 2048)
scene.add(sun)

// ════════════════════════════════════════════════════════════
// PHYSICS WORLD (must be before track/car/props that reference groundMat)
// ════════════════════════════════════════════════════════════
const world = new CANNON.World({ gravity: new CANNON.Vec3(0, -15, 0) })
world.broadphase = new CANNON.SAPBroadphase(world)
world.defaultContactMaterial.friction = 0.3
world.defaultContactMaterial.restitution = 0.2

const groundMat = new CANNON.Material('ground')
const carMat = new CANNON.Material('car')
world.addContactMaterial(new CANNON.ContactMaterial(groundMat, carMat, {
  friction: 0.7, restitution: 0.0  // zero bounce — no weird hops
}))

// ── Ground ──
const floorGeo = new THREE.PlaneGeometry(200, 200)
const floorMeshMat = new THREE.MeshStandardMaterial({ color: 0x559944, roughness: 0.9 })
const floor = new THREE.Mesh(floorGeo, floorMeshMat)
floor.rotation.x = -Math.PI / 2
floor.receiveShadow = true
scene.add(floor)

const floorBody = new CANNON.Body({
  type: CANNON.Body.STATIC,
  shape: new CANNON.Plane(),
  material: groundMat,
})
floorBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0)
world.addBody(floorBody)

// ════════════════════════════════════════════════════════════
// SPACE ENVIRONMENT — stars, planets, meteors beyond the map
// ════════════════════════════════════════════════════════════

// Starfield — thousands of points on a huge sphere
const starCount = 1500
const starGeo = new THREE.BufferGeometry()
const starPos = new Float32Array(starCount * 3)
const starSizes = new Float32Array(starCount)
for (let i = 0; i < starCount; i++) {
  const theta = Math.random() * Math.PI * 2
  const phi = Math.acos(2 * Math.random() - 1)
  const r = 600 + Math.random() * 400
  starPos[i*3]   = r * Math.sin(phi) * Math.cos(theta)
  starPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta)
  starPos[i*3+2] = r * Math.cos(phi)
  starSizes[i] = 0.5 + Math.random() * 2
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3))
starGeo.setAttribute('size', new THREE.BufferAttribute(starSizes, 1))
const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 1.5, sizeAttenuation: true, transparent: true, opacity: 0.9 })
scene.add(new THREE.Points(starGeo, starMat))

// Planets
function addPlanet(x, y, z, radius, color, ringColor) {
  const planet = new THREE.Mesh(
    new THREE.SphereGeometry(radius, 32, 32),
    new THREE.MeshStandardMaterial({ color, roughness: 0.6, metalness: 0.2, emissive: color, emissiveIntensity: 0.15 })
  )
  planet.position.set(x, y, z)
  scene.add(planet)
  if (ringColor) {
    const ring = new THREE.Mesh(
      new THREE.TorusGeometry(radius * 1.6, radius * 0.12, 2, 64),
      new THREE.MeshStandardMaterial({ color: ringColor, emissive: ringColor, emissiveIntensity: 0.3, side: THREE.DoubleSide })
    )
    ring.position.copy(planet.position)
    ring.rotation.x = Math.PI * 0.35
    scene.add(ring)
  }
  return planet
}
const planets = [
  addPlanet(-350, 200, -500, 40, 0xcc6633, 0xddaa66),  // Saturn-like
  addPlanet(400, 150, -400, 25, 0x4466cc, null),         // blue gas giant
  addPlanet(-200, 300, 500, 18, 0xcc3333, null),          // red planet
  addPlanet(500, -100, 300, 55, 0x886644, 0xaa9977),      // big ringed
  addPlanet(0, 400, -600, 12, 0x88ffaa, null),            // green moon
]

// Nebula glow clouds
for (let i = 0; i < 4; i++) {
  const nebula = new THREE.Mesh(
    new THREE.SphereGeometry(30 + Math.random() * 50, 8, 8),
    new THREE.MeshBasicMaterial({
      color: [0x440066, 0x003366, 0x660033, 0x224400][i % 4],
      transparent: true, opacity: 0.06, side: THREE.DoubleSide
    })
  )
  const a = Math.random() * Math.PI * 2
  const r = 400 + Math.random() * 300
  nebula.position.set(Math.cos(a) * r, (Math.random() - 0.5) * 400, Math.sin(a) * r)
  scene.add(nebula)
}

// Meteors — animated streaks
const meteors = []
for (let i = 0; i < 3; i++) {
  const mGeo = new THREE.BoxGeometry(0.5, 0.5, 4)
  const mMat = new THREE.MeshBasicMaterial({ color: 0xffaa44 })
  const meteor = new THREE.Mesh(mGeo, mMat)
  // Tail glow
  const tailGeo = new THREE.BoxGeometry(0.3, 0.3, 8)
  const tailMat = new THREE.MeshBasicMaterial({ color: 0xff6600, transparent: true, opacity: 0.4 })
  const tail = new THREE.Mesh(tailGeo, tailMat)
  tail.position.z = 5
  meteor.add(tail)
  scene.add(meteor)
  meteors.push({
    mesh: meteor,
    x: (Math.random()-0.5) * 800, y: 200 + Math.random() * 300, z: (Math.random()-0.5) * 800,
    vx: -15 - Math.random() * 20, vy: -8 - Math.random() * 10, vz: -10 - Math.random() * 15,
    life: Math.random() * 10
  })
}

function updateSpace(dt) {
  // Slowly rotate planets
  for (const p of planets) p.rotation.y += dt * 0.05

  // Animate meteors
  for (const m of meteors) {
    m.life -= dt
    m.x += m.vx * dt
    m.y += m.vy * dt
    m.z += m.vz * dt
    m.mesh.position.set(m.x, m.y, m.z)
    m.mesh.lookAt(m.x + m.vx, m.y + m.vy, m.z + m.vz)
    if (m.life < 0) {
      // Reset meteor
      m.x = (Math.random()-0.5) * 600
      m.y = 200 + Math.random() * 300
      m.z = (Math.random()-0.5) * 600
      m.vx = -15 - Math.random() * 25
      m.vy = -8 - Math.random() * 12
      m.vz = -10 - Math.random() * 20
      m.life = 5 + Math.random() * 8
    }
  }
}

// (track + edge glow removed for performance)

// CAR — Simple box chassis with 4 sphere wheels via constraints
// Using a single box body + velocity-based driving (no RaycastVehicle)
// ════════════════════════════════════════════════════════════
const carW = 3.6, carH = 1.5, carL = 6.6

// Physics body
const carBody = new CANNON.Body({
  mass: 80,
  shape: new CANNON.Box(new CANNON.Vec3(carW/2, carH/2, carL/2)),
  material: carMat,
  linearDamping: 0.3,
  angularDamping: 0.85,
})
carBody.position.set(0, 3, 0)
world.addBody(carBody)

// Visual — WRX STI styled
const carGroup = new THREE.Group()
scene.add(carGroup)

// Body shell (rally blue)
const bodyMesh = new THREE.Mesh(
  new THREE.BoxGeometry(carW, carH, carL),
  new THREE.MeshStandardMaterial({ color: 0x003399, roughness: 0.3, metalness: 0.6 })
)
bodyMesh.castShadow = true
carGroup.add(bodyMesh)

// Cabin
const cabinMesh = new THREE.Mesh(
  new THREE.BoxGeometry(carW * 0.8, carH * 0.65, carL * 0.45),
  new THREE.MeshStandardMaterial({ color: 0x003399, roughness: 0.3, metalness: 0.5 })
)
cabinMesh.position.y = carH * 0.55
cabinMesh.position.z = carL * 0.03
cabinMesh.castShadow = true
carGroup.add(cabinMesh)

// Windshield
const glassMat = new THREE.MeshStandardMaterial({ color: 0x88bbdd, transparent: true, opacity: 0.5, roughness: 0.1, metalness: 0.8 })
const wsMesh = new THREE.Mesh(new THREE.BoxGeometry(carW * 0.75, carH * 0.5, 0.05), glassMat)
wsMesh.position.set(0, carH * 0.5, -carL * 0.19)
wsMesh.rotation.x = -0.3
carGroup.add(wsMesh)

// Rear window
const rwMesh = new THREE.Mesh(new THREE.BoxGeometry(carW * 0.75, carH * 0.5, 0.05), glassMat)
rwMesh.position.set(0, carH * 0.5, carL * 0.24)
rwMesh.rotation.x = 0.3
carGroup.add(rwMesh)

// Hood scoop
const scoopMesh = new THREE.Mesh(
  new THREE.BoxGeometry(carW * 0.25, carH * 0.18, carL * 0.12),
  new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 })
)
scoopMesh.position.set(0, carH * 0.38, -carL * 0.22)
carGroup.add(scoopMesh)

// Rear wing
const wingMat = new THREE.MeshStandardMaterial({ color: 0x003399, roughness: 0.3, metalness: 0.5 })
const wing = new THREE.Mesh(new THREE.BoxGeometry(carW * 1.05, 0.04, 0.25), wingMat)
wing.position.set(0, carH * 0.9, carL * 0.42)
carGroup.add(wing)
for (const s of [-1, 1]) {
  const post = new THREE.Mesh(new THREE.BoxGeometry(0.05, carH * 0.4, 0.05), new THREE.MeshStandardMaterial({ color: 0x222222 }))
  post.position.set(s * carW * 0.35, carH * 0.68, carL * 0.42)
  carGroup.add(post)
}

// Headlights
const hlMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffcc, emissiveIntensity: 2 })
for (const s of [-1, 1]) {
  const hl = new THREE.Mesh(new THREE.BoxGeometry(carW * 0.2, carH * 0.15, 0.06), hlMat)
  hl.position.set(s * carW * 0.35, 0, -carL * 0.5)
  carGroup.add(hl)
}

// Taillights
const tlMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 1.5 })
for (const s of [-1, 1]) {
  const tl = new THREE.Mesh(new THREE.BoxGeometry(carW * 0.18, carH * 0.12, 0.05), tlMat)
  tl.position.set(s * carW * 0.35, 0, carL * 0.5)
  carGroup.add(tl)
}

// Wheels (visual only — physics is the box sliding)
const wheelGeo = new THREE.CylinderGeometry(0.9, 0.9, 0.6, 12)
wheelGeo.rotateZ(Math.PI / 2)
const wheelMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9 })
const rimMat = new THREE.MeshStandardMaterial({ color: 0xdaa520, roughness: 0.2, metalness: 0.8 })

const wheels = []
const wheelPositions = [
  [-carW/2 - 0.1, -carH/2 + 0.05, -carL * 0.32],
  [ carW/2 + 0.1, -carH/2 + 0.05, -carL * 0.32],
  [-carW/2 - 0.1, -carH/2 + 0.05,  carL * 0.32],
  [ carW/2 + 0.1, -carH/2 + 0.05,  carL * 0.32],
]
for (const [wx, wy, wz] of wheelPositions) {
  const wg = new THREE.Group()
  wg.add(new THREE.Mesh(wheelGeo, wheelMat))
  const rim = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 0.45, 8), rimMat)
  rim.rotation.z = Math.PI / 2
  wg.add(rim)
  wg.position.set(wx, wy, wz)
  carGroup.add(wg)
  wheels.push(wg)
}

// ════════════════════════════════════════════════════════════
// WORLD OBJECTS — interactive physics props
// ════════════════════════════════════════════════════════════
const syncList = [] // { body, mesh }

function addBox(x, y, z, w, h, d, color, mass) {
  const geo = new THREE.BoxGeometry(w, h, d)
  const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.6 })
  const mesh = new THREE.Mesh(geo, mat)
  mesh.castShadow = true
  mesh.receiveShadow = true
  scene.add(mesh)
  const body = new CANNON.Body({ mass, shape: new CANNON.Box(new CANNON.Vec3(w/2, h/2, d/2)) })
  body.position.set(x, y, z)
  world.addBody(body)
  syncList.push({ body, mesh })
  return { body, mesh }
}

function addCylinder(x, y, z, r, h, color, mass) {
  const geo = new THREE.CylinderGeometry(r, r, h, 12)
  const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.6 })
  const mesh = new THREE.Mesh(geo, mat)
  mesh.castShadow = true
  scene.add(mesh)
  const body = new CANNON.Body({ mass, shape: new CANNON.Cylinder(r, r, h, 12) })
  body.position.set(x, y, z)
  world.addBody(body)
  syncList.push({ body, mesh })
}

function addSphere(x, y, z, r, color, mass) {
  const geo = new THREE.SphereGeometry(r, 16, 16)
  const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.5 })
  const mesh = new THREE.Mesh(geo, mat)
  mesh.castShadow = true
  scene.add(mesh)
  const body = new CANNON.Body({ mass, shape: new CANNON.Sphere(r) })
  body.position.set(x, y, z)
  world.addBody(body)
  syncList.push({ body, mesh })
}

// ── MASSIVE 3D TITLE — "GRAND THEFT OTTO" ──
const titleGroup = new THREE.Group()
titleGroup.position.set(0, 12, -25)
scene.add(titleGroup)

// Giant glowing canvas texture
const titleCanvas = document.createElement('canvas')
titleCanvas.width = 2048; titleCanvas.height = 512
const tctx = titleCanvas.getContext('2d')
// Background glow
const tGrad = tctx.createLinearGradient(0,0,0,512)
tGrad.addColorStop(0, 'rgba(255,50,0,0.3)')
tGrad.addColorStop(0.5, 'rgba(255,200,0,0.15)')
tGrad.addColorStop(1, 'rgba(0,0,0,0)')
tctx.fillStyle = tGrad; tctx.fillRect(0,0,2048,512)
// Main text
tctx.textAlign = 'center'; tctx.textBaseline = 'middle'
tctx.font = 'bold 160px Impact, sans-serif'
// Shadow
tctx.fillStyle = '#000'; tctx.fillText('GRAND THEFT OTTO', 1028, 215)
// Orange outline
tctx.strokeStyle = '#ff4400'; tctx.lineWidth = 10; tctx.strokeText('GRAND THEFT OTTO', 1024, 210)
// Gold fill
tctx.fillStyle = '#ffd700'; tctx.fillText('GRAND THEFT OTTO', 1024, 210)
// Chrome highlight
tctx.fillStyle = 'rgba(255,255,255,0.3)'; tctx.fillRect(200, 140, 1648, 40)
// Subtitle
tctx.font = 'bold 40px sans-serif'; tctx.fillStyle = '#fff'
tctx.fillText('PRESS  W  TO  DRIVE', 1024, 400)

const titleTex = new THREE.CanvasTexture(titleCanvas)
titleTex.minFilter = THREE.LinearFilter
// Main billboard — big
const titleMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(40, 10),
  new THREE.MeshBasicMaterial({ map: titleTex, transparent: true, side: THREE.DoubleSide })
)
titleGroup.add(titleMesh)

// Glowing backing panel for depth
const backGlow = new THREE.Mesh(
  new THREE.PlaneGeometry(42, 11),
  new THREE.MeshBasicMaterial({ color: 0xff4400, transparent: true, opacity: 0.08, side: THREE.DoubleSide })
)
backGlow.position.z = -0.5
titleGroup.add(backGlow)

// Spotlights on the title
for (const side of [-1, 1]) {
  const spot = new THREE.PointLight(0xffd700, 3, 40)
  spot.position.set(side * 15, -3, 5)
  titleGroup.add(spot)
}


// ── Strategic jump ramps ──
function addJump(x, z, ry, w, slope, color) {
  const len = 6, h = 0.3
  const geo = new THREE.BoxGeometry(w || 5, h, len)
  const mat = new THREE.MeshStandardMaterial({ color: color || 0xdaa520, roughness: 0.5 })
  const mesh = new THREE.Mesh(geo, mat)
  mesh.castShadow = true
  scene.add(mesh)
  const body = new CANNON.Body({
    type: CANNON.Body.STATIC,
    shape: new CANNON.Box(new CANNON.Vec3((w||5)/2, h/2, len/2)),
    material: groundMat,
  })
  body.position.set(x, 0.8, z)
  body.quaternion.setFromEuler(-(slope || 0.18), ry || 0, 0)
  mesh.position.copy(body.position)
  mesh.quaternion.copy(body.quaternion)
  world.addBody(body)
  // Chevron stripes on top
  const stripeMat = new THREE.MeshStandardMaterial({ color: 0xffcc00, emissive: 0xffaa00, emissiveIntensity: 0.3 })
  for (let i = 0; i < 3; i++) {
    const s = new THREE.Mesh(new THREE.BoxGeometry((w||5) * 0.8, 0.02, 0.2), stripeMat)
    s.position.copy(mesh.position)
    s.rotation.copy(mesh.rotation)
    const offset = new THREE.Vector3(0, 0.18, -1.5 + i * 1.5)
    offset.applyEuler(mesh.rotation)
    s.position.add(offset)
    scene.add(s)
  }
}

// Big center jump — aimed straight ahead from spawn
addJump(0, -20, 0, 6, 0.22, 0xff6600)
// Side jumps in an X pattern
addJump(25, -25, Math.PI/4, 5, 0.2, 0xdaa520)
addJump(-25, -25, -Math.PI/4, 5, 0.2, 0xdaa520)
addJump(25, 25, -Math.PI/4, 5, 0.18, 0xdaa520)
addJump(-25, 25, Math.PI/4, 5, 0.18, 0xdaa520)
// Long distance jumps
addJump(50, 0, Math.PI/2, 6, 0.25, 0xff4400)
addJump(-50, 0, Math.PI/2, 6, 0.25, 0xff4400)
addJump(0, 50, 0, 6, 0.25, 0xff4400)
// Small kickers scattered around
addJump(15, -40, 0.3, 3, 0.15, 0xcc8800)
addJump(-35, 15, 1.0, 3, 0.15, 0xcc8800)
addJump(40, -15, 2.0, 3, 0.15, 0xcc8800)
addJump(-15, 40, -0.5, 3, 0.15, 0xcc8800)

// (berms removed for performance)

// ── Creatures — purely visual, no physics interaction ──
const creatureList = []

// Helper: create mesh and set position (Object.assign doesn't work on THREE.Mesh .position)
function mp(geo, mat, x, y, z, ud) {
  const m = new THREE.Mesh(geo, mat); m.position.set(x,y,z); m.castShadow=true
  if(ud) Object.assign(m.userData, ud); return m
}

function buildCreature(type) {
  const g = new THREE.Group()
  if (type === 'dinosaur') {
    const s = 3
    const bm = new THREE.MeshStandardMaterial({ color: 0x2e8b57, roughness: 0.7, flatShading: true })
    const dm = new THREE.MeshStandardMaterial({ color: 0x1a5a35, roughness: 0.7, flatShading: true })
    const em = new THREE.MeshStandardMaterial({ color: 0xffcc00, emissive: 0xffcc00, emissiveIntensity: 0.5 })
    g.add(mp(new THREE.BoxGeometry(s*0.7,s*0.8,s*1.4), bm, 0,s*0.9,0))
    g.add(mp(new THREE.BoxGeometry(s*0.5,s*0.5,s*0.6), bm, 0,s*1.4,-s*0.8))
    g.add(mp(new THREE.BoxGeometry(s*0.45,s*0.15,s*0.5), dm, 0,s*1.1,-s*0.85))
    for (const side of [-1,1]) g.add(mp(new THREE.SphereGeometry(s*0.08,6,6), em, side*s*0.22,s*1.5,-s*0.95))
    for (const side of [-1,1]) g.add(mp(new THREE.BoxGeometry(s*0.25,s*0.7,s*0.3), dm, side*s*0.3,s*0.35,s*0.2, {leg:true}))
    for (const side of [-1,1]) g.add(mp(new THREE.BoxGeometry(s*0.08,s*0.25,s*0.08), bm, side*s*0.35,s*1.0,-s*0.4))
    g.add(mp(new THREE.BoxGeometry(s*0.3,s*0.35,s*1.2), bm, 0,s*0.8,s*1.1, {tail:true}))
    for (let i=0;i<6;i++) g.add(mp(new THREE.ConeGeometry(s*0.06,s*0.2,4), new THREE.MeshStandardMaterial({color:0x3a7a4a,flatShading:true}), 0,s*1.35,-s*0.4+i*s*0.35))
  }
  else if (type === 'dragon') {
    const s = 2.5
    const bm = new THREE.MeshStandardMaterial({ color: 0x8b0000, roughness: 0.6, flatShading: true })
    const wm = new THREE.MeshStandardMaterial({ color: 0xa01020, roughness: 0.7, flatShading: true, side: THREE.DoubleSide })
    g.add(mp(new THREE.BoxGeometry(s*0.6,s*0.5,s*1.3), bm, 0,s*1.2,0))
    g.add(mp(new THREE.BoxGeometry(s*0.4,s*0.35,s*0.5), bm, 0,s*1.4,-s*0.7))
    const hm = new THREE.MeshStandardMaterial({color:0x444444})
    for (const side of [-1,1]) { const h = mp(new THREE.ConeGeometry(s*0.04,s*0.3,5),hm,side*s*0.15,s*1.65,-s*0.6); h.rotation.x=-0.3; g.add(h) }
    const em = new THREE.MeshStandardMaterial({ color: 0xff4400, emissive: 0xff4400, emissiveIntensity: 1 })
    for (const side of [-1,1]) g.add(mp(new THREE.SphereGeometry(s*0.06,6,6), em, side*s*0.16,s*1.48,-s*0.88))
    for (const side of [-1,1]) {
      const wGeo = new THREE.BufferGeometry()
      const v = new Float32Array([0,0,0, side*s*1.5,-s*0.3,0, side*s*1.2,s*0.8,0, side*s*0.4,s*0.5,0])
      wGeo.setAttribute('position', new THREE.BufferAttribute(v,3)); wGeo.setIndex([0,1,2,0,2,3]); wGeo.computeVertexNormals()
      const w = new THREE.Mesh(wGeo,wm); w.position.set(0,s*1.3,-s*0.1); w.userData.wing=true; w.userData.side=side; g.add(w)
    }
    for (const side of [-1,1]) g.add(mp(new THREE.BoxGeometry(s*0.15,s*0.6,s*0.2), bm, side*s*0.25,s*0.6,s*0.2, {leg:true}))
    g.add(mp(new THREE.BoxGeometry(s*0.2,s*0.2,s*1.0), bm, 0,s*1.1,s*0.95, {tail:true}))
    const fire = mp(new THREE.SphereGeometry(s*0.15,8,8), new THREE.MeshStandardMaterial({color:0xff6600,emissive:0xff4400,emissiveIntensity:2,transparent:true,opacity:0}), 0,s*1.35,-s*1.0, {fire:true})
    g.add(fire)
  }
  else if (type === 'wolf') {
    const s = 1.2
    const bm = new THREE.MeshStandardMaterial({ color: 0x696969, roughness: 0.8, flatShading: true })
    const lm = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.8, flatShading: true })
    g.add(mp(new THREE.BoxGeometry(s*0.5,s*0.45,s*1.1), bm, 0,s*0.55,0))
    g.add(mp(new THREE.BoxGeometry(s*0.35,s*0.3,s*0.4), lm, 0,s*0.7,-s*0.6))
    g.add(mp(new THREE.BoxGeometry(s*0.2,s*0.15,s*0.25), lm, 0,s*0.6,-s*0.82))
    for (const side of [-1,1]) g.add(mp(new THREE.ConeGeometry(s*0.07,s*0.2,4), bm, side*s*0.12,s*0.9,-s*0.5))
    const em = new THREE.MeshStandardMaterial({color:0xcccc00,emissive:0xcccc00,emissiveIntensity:0.3})
    for (const side of [-1,1]) g.add(mp(new THREE.SphereGeometry(s*0.04,6,6), em, side*s*0.12,s*0.75,-s*0.73))
    for (const side of [-1,1]) for (const fz of [-s*0.3,s*0.3]) g.add(mp(new THREE.BoxGeometry(s*0.1,s*0.45,s*0.12), bm, side*s*0.2,s*0.22,fz, {leg:true}))
    g.add(mp(new THREE.BoxGeometry(s*0.08,s*0.1,s*0.5), bm, 0,s*0.6,s*0.75, {tail:true}))
  }
  return g
}

let creatureScore = 0
const creatureScoreHud = document.createElement('div')
creatureScoreHud.style.cssText = 'position:fixed;top:20px;right:20px;color:#ff4444;font:bold 1.3rem monospace;pointer-events:none;z-index:10;display:none'
document.body.appendChild(creatureScoreHud)

function updateCreatures(dt) {
  const px = carBody.position.x, pz = carBody.position.z
  const isGiant = activePU === 'giant'

  // Show score HUD only when giant mode has been used at least once
  if (creatureScore > 0) {
    creatureScoreHud.style.display = 'block'
    creatureScoreHud.textContent = 'Creatures: ' + creatureScore
  }

  for (const c of creatureList) {
    // Handle respawn timer for eaten creatures
    if (c.eaten) {
      c.respawnTimer -= dt
      if (c.respawnTimer <= 0) {
        c.eaten = false
        c.mesh.visible = true
        // Respawn far from player
        c.x = c.homeX; c.z = c.homeZ
        c.state = 'wander'
      }
      continue
    }

    c.anim += dt * (c.state === 'chase' || c.state === 'flee' ? 8 : 4)
    const dx = px - c.x, dz = pz - c.z
    const dist = Math.sqrt(dx*dx + dz*dz)

    // GIANT MODE — Pac-Man style: creatures flee, can be eaten
    if (isGiant) {
      c.state = 'flee'
      // Run AWAY from the car
      const fleeAngle = Math.atan2(-dx, -dz)
      let ad = fleeAngle - c.angle; while(ad>Math.PI)ad-=Math.PI*2; while(ad<-Math.PI)ad+=Math.PI*2
      c.angle += ad * dt * 6
      const fleeSpeed = c.chaseSpeed * 1.3
      c.x += Math.sin(c.angle) * fleeSpeed * dt
      c.z += Math.cos(c.angle) * fleeSpeed * dt

      // Car runs over creature — earn a point!
      if (dist < 6) {
        c.eaten = true
        c.respawnTimer = 5 // respawn after 5 seconds
        c.mesh.visible = false
        creatureScore++
        // Flash feedback
        puToast.textContent = '+1 CREATURE!'
        puToast.style.color = '#ff4444'
        puToast.style.opacity = '1'
        setTimeout(() => puToast.style.opacity = '0', 1200)
        // Fireworks burst on eat
        spawnFireworks()
      }
    }
    // Normal behavior
    else if (c.state === 'flee') {
      // Giant mode just ended — go back to wandering
      c.state = 'wander'
      c.wanderTarget = { x: c.x + (Math.random()-0.5)*40, z: c.z + (Math.random()-0.5)*40 }
      c.wanderTimer = 200
    }
    else if (c.state === 'wander' && dist < c.chaseRange) {
      c.state = 'chase'
    }
    else if (c.state === 'chase' && dist > c.giveUp) {
      c.state = 'wander'
      c.wanderTarget = { x: c.x + (Math.random()-0.5)*40, z: c.z + (Math.random()-0.5)*40 }
      c.wanderTimer = 200
    }

    if (c.state === 'chase') {
      const ta = Math.atan2(dx, dz)
      let ad = ta - c.angle; while(ad>Math.PI)ad-=Math.PI*2; while(ad<-Math.PI)ad+=Math.PI*2
      c.angle += ad * dt * 5
      c.x += Math.sin(c.angle) * c.chaseSpeed * dt
      c.z += Math.cos(c.angle) * c.chaseSpeed * dt
    } else if (c.state === 'wander') {
      c.wanderTimer -= dt * 60
      if (c.wanderTimer <= 0) {
        c.wanderTarget = { x: c.homeX + (Math.random()-0.5)*40, z: c.homeZ + (Math.random()-0.5)*40 }
        c.wanderTimer = 180 + Math.random() * 240
      }
      const wx = c.wanderTarget.x - c.x, wz = c.wanderTarget.z - c.z
      const ta = Math.atan2(wx, wz)
      let ad = ta - c.angle; while(ad>Math.PI)ad-=Math.PI*2; while(ad<-Math.PI)ad+=Math.PI*2
      c.angle += ad * dt * 2
      c.x += Math.sin(c.angle) * c.speed * dt
      c.z += Math.cos(c.angle) * c.speed * dt
    }

    c.x = Math.max(-90, Math.min(90, c.x))
    c.z = Math.max(-90, Math.min(90, c.z))

    // Dino stomp
    const stompY = c.type === 'dinosaur' ? Math.abs(Math.sin(c.anim * 1.5)) * 0.3 : 0
    c.mesh.position.set(c.x, stompY, c.z)
    c.mesh.rotation.y = c.angle

    // Creatures flash blue when fleeing (Pac-Man scared ghost style)
    if (c.state === 'flee') {
      c.mesh.traverse(child => {
        if (child.isMesh && child.material && !child.userData.fire) {
          if (!child.userData._origColor) child.userData._origColor = child.material.color.getHex()
          child.material.color.setHex(Math.sin(c.anim * 8) > 0 ? 0x4444ff : 0x2222aa)
        }
      })
    } else {
      // Restore original colors
      c.mesh.traverse(child => {
        if (child.userData._origColor) {
          child.material.color.setHex(child.userData._origColor)
          delete child.userData._origColor
        }
      })
    }

    // Animate legs/tail/wings
    const legAnim = Math.sin(c.anim) * 0.3
    const legSpeed = c.state === 'flee' ? 1.5 : (c.state === 'chase' ? 1 : 0.5)
    c.mesh.traverse(child => {
      if (child.userData.leg) child.rotation.x = legAnim * legSpeed
      if (child.userData.tail) child.rotation.y = Math.sin(c.anim * 0.7) * 0.4
      if (child.userData.wing) child.rotation.z = Math.sin(c.anim * 2) * 0.3 * child.userData.side
      if (child.userData.fire) child.material.opacity = c.state === 'chase' ? 0.6 + Math.sin(c.anim*4)*0.3 : 0
    })
  }
}

const keys = {}

const locColors = [0x559944, 0xd2b48c, 0xeeeeff, 0x333344]

// Build options menu DOM
function buildOptMenu() {
  const list = document.getElementById('opt-list')
  list.innerHTML = ''
  const items = [
    { label: 'Creatures', key: 'creatures', val: opts.creatures ? 'ON' : 'OFF' },
    { label: 'Sound', key: 'sound', val: opts.sound ? 'ON' : 'OFF' },
    { label: 'Powerups', key: 'powerups', val: opts.powerups ? 'ON' : 'OFF' },
    { label: 'Location', key: 'location', val: locNames[opts.location] },
  ]
  items.forEach((it, idx) => {
    const row = document.createElement('div')
    row.style.cssText = 'display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #333'
    if (idx === optSel) row.style.background = 'rgba(255,215,0,0.1)'
    const sel = idx === optSel ? ' style="color:#ffd700;font-size:1.1rem"' : ''
    row.innerHTML = `<span${sel}>${idx === optSel ? '► ' : ''}${it.label}</span>
      <button onclick="toggleOpt('${it.key}')" style="background:${it.val==='ON'||it.key==='location'?'#ffd700':'#333'};color:${it.val==='ON'||it.key==='location'?'#111':'#fff'};border:1px solid #555;padding:5px 14px;border-radius:4px;cursor:pointer;font-size:0.85rem">${it.val}</button>`
    list.appendChild(row)
  })
}
window.toggleOpt = function(key) {
  if (key === 'location') { opts.location = (opts.location + 1) % locNames.length; floor.material.color.setHex(locColors[opts.location]) }
  else opts[key] = !opts[key]
  // Apply creature visibility
  if (key === 'creatures') creatureList.forEach(c => c.mesh.visible = opts.creatures)
  // Apply powerup visibility
  if (key === 'powerups') powerupMeshes.forEach(p => { if(!p.collected) p.mesh.visible = opts.powerups })
  buildOptMenu()
}

document.getElementById('opt-resume').onclick = () => { menuOpen = false; document.getElementById('opts').style.display = 'none' }

window.addEventListener('keydown', e => {
  keys[e.code] = true
  if (e.code === 'Escape') {
    menuOpen = !menuOpen
    document.getElementById('opts').style.display = menuOpen ? 'block' : 'none'
    if (menuOpen) buildOptMenu()
  }
})
window.addEventListener('keyup', e => { keys[e.code] = false })

const powerupMeshes = []
const puTypes = [
  { name: 'SPEED BOOST', color: 0x00ccff, emissive: 0x0088ff, effect: 'speed', duration: 5 },
  { name: 'MEGA JUMP', color: 0xff44ff, emissive: 0xcc00cc, effect: 'jump', duration: 0 },

  { name: 'COIN x10', color: 0xffd700, emissive: 0xffaa00, effect: 'coins', duration: 0 },
]
let activePU = null, puTimer = 0, coinCount = 0
let jumpFlipActive = false, jumpFlipTime = 0
const puToast = document.createElement('div')
puToast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);color:#fff;font:bold 1.2rem monospace;text-shadow:0 0 10px #000;pointer-events:none;z-index:10;opacity:0;transition:opacity 0.3s'

for (let i = 0; i < 25; i++) {
  const t = puTypes[i % puTypes.length]
  const x = (Math.random()-0.5) * 160, z = (Math.random()-0.5) * 160
  if (Math.abs(x)<8 && Math.abs(z)<8) continue
  const geo = new THREE.SphereGeometry(0.8, 12, 12)
  const mat = new THREE.MeshStandardMaterial({ color: t.color, emissive: t.emissive, emissiveIntensity: 1, transparent: true, opacity: 0.85 })
  const mesh = new THREE.Mesh(geo, mat)
  mesh.position.set(x, 1.5, z)
  scene.add(mesh)
  powerupMeshes.push({ mesh, type: t, x, z, collected: false, bob: Math.random()*Math.PI*2 })
}

function updatePowerups(dt) {
  if (!opts.powerups) return
  const px = carBody.position.x, pz = carBody.position.z
  for (const p of powerupMeshes) {
    if (p.collected) continue
    p.bob += dt * 3
    p.mesh.position.y = 1.5 + Math.sin(p.bob) * 0.4
    p.mesh.rotation.y += dt * 2
    const dx = px - p.x, dz = pz - p.z
    if (dx*dx+dz*dz < 9) {
      p.collected = true; p.mesh.visible = false
      puToast.textContent = p.type.name + '!'
      puToast.style.color = '#'+p.type.color.toString(16).padStart(6,'0')
      puToast.style.opacity = '1'
      setTimeout(() => puToast.style.opacity = '0', 2000)
      if (p.type.effect === 'speed') { activePU = 'speed'; puTimer = 5 }
      else if (p.type.effect === 'jump') { carBody.velocity.y = 30; jumpFlipActive = true; jumpFlipTime = 0 }
      else if (p.type.effect === 'giant') { activePU = 'giant'; puTimer = 6; carGroup.scale.setScalar(3) }
      else if (p.type.effect === 'coins') coinCount += 10
    }
  }
  if (puTimer > 0) { puTimer -= dt; if (puTimer <= 0) { activePU = null; carGroup.scale.setScalar(1) } }
}

// Feature 1: FIREWORKS on horn (H key) — burst of colorful particles
const fireworks = []
function spawnFireworks() {
  for (let i = 0; i < 20; i++) {
    const geo = new THREE.SphereGeometry(0.25, 3, 3)
    const colors = [0xff0000, 0x00ff00, 0x0088ff, 0xffff00, 0xff00ff, 0xff8800]
    const mat = new THREE.MeshBasicMaterial({ color: colors[Math.floor(Math.random()*colors.length)] })
    const m = new THREE.Mesh(geo, mat)
    m.position.copy(carBody.position)
    m.position.y += 3
    scene.add(m)
    fireworks.push({
      mesh: m, life: 1.5 + Math.random(),
      vx: (Math.random()-0.5)*15, vy: 8+Math.random()*10, vz: (Math.random()-0.5)*15
    })
  }
}
function updateFireworks(dt) {
  for (let i = fireworks.length-1; i >= 0; i--) {
    const f = fireworks[i]
    f.life -= dt
    f.mesh.position.x += f.vx*dt; f.mesh.position.y += f.vy*dt; f.mesh.position.z += f.vz*dt
    f.vy -= 12*dt
    f.mesh.material.opacity = Math.max(0, f.life)
    f.mesh.material.transparent = true
    if (f.life <= 0) { scene.remove(f.mesh); fireworks.splice(i, 1) }
  }
}

// Feature 2: TURBO TRAIL — colorful ribbon behind car at high speed
const trailParts = []
let _trailFrame = 0
function updateTrail(dt) {
  _trailFrame++
  if (Math.abs(carSpeed) > 10 && _trailFrame % 3 === 0 && trailParts.length < 30) {
    const geo = new THREE.SphereGeometry(0.3, 3, 3)
    const hue = (performance.now() * 0.001) % 1
    const color = new THREE.Color().setHSL(hue, 1, 0.5)
    const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.8 })
    const m = new THREE.Mesh(geo, mat)
    m.position.copy(carBody.position); m.position.y += 0.3
    scene.add(m)
    trailParts.push({ mesh: m, life: 1.5 })
  }
  for (let i = trailParts.length-1; i >= 0; i--) {
    trailParts[i].life -= dt
    trailParts[i].mesh.material.opacity = trailParts[i].life / 1.5
    trailParts[i].mesh.scale.setScalar(trailParts[i].life)
    if (trailParts[i].life <= 0) { scene.remove(trailParts[i].mesh); trailParts.splice(i, 1) }
  }
}

// CAR DRIVING — direct velocity control (no RaycastVehicle)
// ════════════════════════════════════════════════════════════
const maxSpeed = 30
const accel = 20
const brakeForce = 15
const turnSpeed = 2.5
const boostMult = 2.5
let carSpeed = 0
let carAngle = 0

function updateCar(dt) {
  // Get car's up vector — if flipped, R resets
  const up = new CANNON.Vec3(0, 1, 0)
  carBody.quaternion.vmult(up, up)

  if (keys['KeyR']) {
    carBody.position.set(carBody.position.x, 3, carBody.position.z)
    carBody.quaternion.setFromEuler(0, carAngle, 0)
    carBody.velocity.setZero()
    carBody.angularVelocity.setZero()
    carSpeed = 0; return
  }
  if (keys['KeyH'] && !keys._hornCd) { keys._hornCd=true; spawnFireworks(); setTimeout(()=>keys._hornCd=false,500) }

  // Only drive if car is roughly upright
  if (up.y < 0.5) return

  // Read ALL inputs first — keyboard + gamepad
  const gp = navigator.getGamepads?.()[0]
  const gpRT = gp?.buttons[7]?.value || 0
  const gpLT = gp?.buttons[6]?.value || 0
  const gpStickX = gp ? (Math.abs(gp.axes[0]) > 0.15 ? gp.axes[0] : 0) : 0
  const gpBoosting = gp?.buttons[0]?.pressed || false
  const gpHasThrottle = gpRT > 0.15 || gpLT > 0.15

  const kbFwd = (keys['ArrowUp'] || keys['KeyW']) ? 1 : 0
  const kbRev = (keys['ArrowDown'] || keys['KeyS']) ? 1 : 0
  const kbThrottle = kbFwd - kbRev
  const kbBoosting = keys['Space']

  // Combine boost from either source
  const boosting = kbBoosting || gpBoosting
  const speedMul = activePU === 'speed' ? 2 : 1
  const effAccel = (boosting ? accel * boostMult : accel) * speedMul
  const effMax = (boosting ? maxSpeed * 1.8 : maxSpeed) * speedMul

  // Throttle — gamepad overrides keyboard entirely if triggers are active
  if (gpHasThrottle) {
    // Gamepad triggers: full acceleration regardless of trigger depth
    if (gpRT > gpLT) carSpeed = Math.min(carSpeed + effAccel * dt, effMax)
    else carSpeed = Math.max(carSpeed - brakeForce * dt, -effMax * 0.4)
  } else if (kbThrottle > 0) {
    carSpeed = Math.min(carSpeed + effAccel * dt, effMax)
  } else if (kbThrottle < 0) {
    carSpeed = Math.max(carSpeed - brakeForce * dt, -effMax * 0.4)
  } else {
    // Coast to stop — only when NOTHING is pressed
    carSpeed *= (1 - 2 * dt)
    if (Math.abs(carSpeed) < 0.1) carSpeed = 0
  }

  // Steering — combine keyboard + gamepad
  const kbLeft = (keys['ArrowLeft'] || keys['KeyA']) ? 1 : 0
  const kbRight = (keys['ArrowRight'] || keys['KeyD']) ? 1 : 0
  const steerInput = (kbRight - kbLeft) || -gpStickX

  if (Math.abs(carSpeed) > 0.5 && Math.abs(steerInput) > 0) {
    const turnFactor = Math.min(1, Math.abs(carSpeed) / 8)
    carAngle += steerInput * turnSpeed * turnFactor * dt * Math.sign(carSpeed)
  }

  // Gamepad buttons
  if (gp) {
    if (gp.buttons[1]?.pressed) { // B = reset
      carBody.position.set(carBody.position.x, 3, carBody.position.z)
      carBody.quaternion.setFromEuler(0, carAngle, 0)
      carBody.velocity.setZero(); carBody.angularVelocity.setZero(); carSpeed = 0
    }
    if (gp.buttons[3]?.pressed && !keys._gpHorn) { keys._gpHorn=true; spawnFireworks(); setTimeout(()=>keys._gpHorn=false,500) } // Y = fireworks
    // Start = toggle menu
    if (gp.buttons[9]?.pressed && !keys._gpStart) {
      keys._gpStart=true
      menuOpen=!menuOpen; document.getElementById('opts').style.display=menuOpen?'block':'none'
      if(menuOpen) buildOptMenu()
      setTimeout(()=>keys._gpStart=false,300)
    }
    // Menu navigation with D-pad / A button when menu open
    if (menuOpen) {
      if (gp.buttons[12]?.pressed && !keys._gpUp) { keys._gpUp=true; optSel=Math.max(0,optSel-1); buildOptMenu(); setTimeout(()=>keys._gpUp=false,200) }
      if (gp.buttons[13]?.pressed && !keys._gpDn) { keys._gpDn=true; optSel=Math.min(3,optSel+1); buildOptMenu(); setTimeout(()=>keys._gpDn=false,200) }
      if (gp.buttons[0]?.pressed && !keys._gpA) { // A = toggle selected option
        keys._gpA=true
        toggleOpt(['creatures','sound','powerups','location'][optSel])
        setTimeout(()=>keys._gpA=false,250)
      }
    }
  }

  // Apply to physics body
  carBody.velocity.set(
    -Math.sin(carAngle) * carSpeed,
    carBody.velocity.y,
    -Math.cos(carAngle) * carSpeed
  )

  // Jump flip/twist animation
  if (jumpFlipActive) {
    jumpFlipTime += dt
    // Do a full front flip + 360 twist over ~1.5 seconds
    const flipProgress = Math.min(jumpFlipTime / 1.5, 1)
    const flipAngle = flipProgress * Math.PI * 2  // full front flip
    const twistAngle = flipProgress * Math.PI * 2  // full 360 twist
    carBody.quaternion.setFromEuler(flipAngle, carAngle + twistAngle, 0)
    // When close to landing (falling down and near ground), snap upright
    if (carBody.position.y < 4 && carBody.velocity.y < 0 && flipProgress > 0.7) {
      jumpFlipActive = false
      carBody.quaternion.setFromEuler(0, carAngle, 0)
      carBody.angularVelocity.setZero()
    }
  } else {
    carBody.quaternion.setFromEuler(0, carAngle, 0)
    // Keep car from tipping
    carBody.angularVelocity.x *= 0.5
    carBody.angularVelocity.z *= 0.5
  }

  // HUD
  document.getElementById('spd').textContent = Math.floor(Math.abs(carSpeed) * 3.6) + ' km/h'
}

// ════════════════════════════════════════════════════════════
// CAMERA — chase cam
// ════════════════════════════════════════════════════════════
const camTarget = new THREE.Vector3()
const camPos = new THREE.Vector3(0, 12, 15)

function updateCamera(dt) {
  const p = carBody.position
  const back = new THREE.Vector3(Math.sin(carAngle), 0, Math.cos(carAngle))
  const dist = 10 + Math.abs(carSpeed) * 0.15
  const height = 6 + Math.abs(carSpeed) * 0.08

  const ideal = new THREE.Vector3(p.x + back.x * dist, p.y + height, p.z + back.z * dist)
  camPos.lerp(ideal, 1 - Math.pow(0.02, dt))
  camera.position.copy(camPos)

  camTarget.lerp(new THREE.Vector3(p.x, p.y + 1, p.z), 1 - Math.pow(0.01, dt))
  camera.lookAt(camTarget)
}

// ════════════════════════════════════════════════════════════
// TITLE BILLBOARD
// ════════════════════════════════════════════════════════════
function updateTitle() {
  if (!titleGroup.parent) return
  titleGroup.lookAt(camera.position)
  // Gentle float
  titleGroup.position.y = 12 + Math.sin(performance.now() * 0.001) * 0.5
  // Fade when player drives away
  const dist = new THREE.Vector3().copy(carBody.position).length()
  const fade = Math.max(0, 1 - dist / 35)
  titleMesh.material.opacity = fade
  backGlow.material.opacity = fade * 0.08
  if (fade <= 0) scene.remove(titleGroup)
}

// ════════════════════════════════════════════════════════════
// INTRO SEQUENCE — clouds part, zoom to car (Simpsons-style)
// ════════════════════════════════════════════════════════════
let introActive = true
let introTime = 0
const introDuration = 4 // seconds
const introClouds = []

// Create cloud planes
const cloudMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.95, side: THREE.DoubleSide })
for (let i = 0; i < 20; i++) {
  const size = 20 + Math.random() * 30
  const cloud = new THREE.Mesh(new THREE.PlaneGeometry(size, size * 0.4), cloudMat.clone())
  const angle = Math.random() * Math.PI * 2
  const r = Math.random() * 30
  cloud.position.set(Math.cos(angle) * r, 20 + Math.random() * 15, Math.sin(angle) * r)
  cloud.lookAt(0, cloud.position.y, 0)
  cloud.rotation.z = Math.random() * 0.5
  scene.add(cloud)
  introClouds.push({ mesh: cloud, origX: cloud.position.x, origZ: cloud.position.z, dir: angle })
}

function updateIntro(dt) {
  if (!introActive) return
  introTime += dt

  const t = Math.min(introTime / introDuration, 1)

  // Clouds drift outward and fade
  for (const c of introClouds) {
    const spread = t * 60
    c.mesh.position.x = c.origX + Math.cos(c.dir) * spread
    c.mesh.position.z = c.origZ + Math.sin(c.dir) * spread
    c.mesh.material.opacity = Math.max(0, 0.95 - t * 1.5)
    c.mesh.position.y += dt * 2 // float up
  }

  // Camera: start high and far, zoom down to car
  if (t < 1) {
    const eased = 1 - Math.pow(1 - t, 3) // ease out cubic
    const startY = 80, endY = 8
    const startDist = 60, endDist = 12
    camera.position.set(
      Math.sin(t * 0.5) * (startDist - eased * (startDist - endDist)),
      startY - eased * (startY - endY),
      startDist - eased * (startDist - endDist)
    )
    camera.lookAt(0, 2, 0)
  }

  if (t >= 1) {
    introActive = false
    // Remove clouds
    for (const c of introClouds) scene.remove(c.mesh)
    introClouds.length = 0
    // Hide loading screen
    document.getElementById('loading').classList.add('done')
  }
}

// ════════════════════════════════════════════════════════════
// OFF-MAP CHECK
// ════════════════════════════════════════════════════════════
function checkBounds() {
  const p = carBody.position
  if (Math.abs(p.x) > 130 || Math.abs(p.z) > 130 || p.y < -10) {
    carBody.position.set(0, 3, 0)
    carBody.velocity.setZero()
    carBody.angularVelocity.setZero()
    carAngle = 0
    carSpeed = 0
  }
}

// ════════════════════════════════════════════════════════════
// GAME LOOP
// ════════════════════════════════════════════════════════════
let lastTime = performance.now()

function loop() {
  requestAnimationFrame(loop)
  const now = performance.now()
  const dt = Math.min((now - lastTime) / 1000, 0.05)
  lastTime = now

  // Intro overrides car control and camera
  if (introActive) {
    updateIntro(dt)
    world.step(1/60, dt, 3)
    carGroup.position.copy(carBody.position)
    carGroup.quaternion.copy(carBody.quaternion)
    updateSpace(dt)
    renderer.render(scene, camera)
    return
  }

  updateCar(dt)
  world.step(1/60, dt, 3)

  carGroup.position.copy(carBody.position)
  carGroup.quaternion.copy(carBody.quaternion)

  const wheelSpin = carSpeed * dt * 3
  for (const w of wheels) {
    w.children[0].rotation.x += wheelSpin
    w.children[1].rotation.x += wheelSpin
  }

  for (const { body, mesh } of syncList) {
    mesh.position.copy(body.position)
    mesh.quaternion.copy(body.quaternion)
  }

  updateCamera(dt)
  updateTitle()
  updateSpace(dt)
  if (opts.creatures) updateCreatures(dt)
  updatePowerups(dt)
  updateFireworks(dt)
  updateTrail(dt)
  updateCoins()
  checkBounds()

  if (menuOpen) { renderer.render(scene, camera); return } // still render but don't process input further
  renderer.render(scene, camera)
}

loop()
</script>
